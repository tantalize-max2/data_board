<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 夏收行动标准化穿透部署</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+XiaoWei&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg-deep:#102a4a;
  --bg-dark:#1a3a6b;
  --bg-panel:#2256a0;
  --bg-card:rgba(45,90,150,.75);
  --bg-card-hover:rgba(60,115,190,.85);
  --bg-input:rgba(25,60,110,.9);

  --cyan:#a8d5ff;
  --cyan-dim:#7fb8e8;
  --cyan-glow:rgba(168,213,255,.18);
  --cyan-bg:rgba(168,213,255,.08);
  --blue:#6ba3d8;
  --blue-bright:#9cc8f0;
  --blue-glow:rgba(107,163,216,.18);
  --blue-bg:rgba(107,163,216,.08);
  --teal:#8eecd0;
  --teal-dim:#6cd4b0;
  --teal-glow:rgba(142,236,208,.15);
  --aurora:#c4b5e8;
  --aurora-glow:rgba(196,181,232,.15);

  --text-primary:#ffffff;
  --text-secondary:#e8eef5;
  --text-dim:#b8c8d8;
  --text-accent:#ffd980;

  --border:rgba(150,200,250,.25);
  --border-hover:rgba(180,220,255,.4);
  --border-active:rgba(200,235,255,.6);
  --divider:rgba(150,200,250,.12);

  --glow-sm:0 0 12px rgba(120,180,240,.12);
  --glow-md:0 0 24px rgba(120,180,240,.08);
  --shadow-panel:0 8px 32px rgba(0,8,30,.3);

  --radius:6px;
  --font-display:'ZCOOL XiaoWei','Noto Sans SC',serif;
  --font-body:'Noto Sans SC','Microsoft YaHei',sans-serif;
}

body{font-family:var(--font-body);background-color:var(--bg-deep);background-image:url('/static/background.png');background-size:cover;background-position:center center;background-repeat:no-repeat;background-attachment:fixed;color:var(--text-primary);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* 全局背景：图片蓝色遮罩 + 极淡网格 */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at center,rgba(18,42,90,.82) 0%,rgba(18,42,90,.68) 35%,rgba(18,42,90,.5) 70%,rgba(18,42,90,.45) 100%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(rgba(0,180,255,.035) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,180,255,.035) 1px,transparent 1px);
  background-size:60px 60px}
body>*{position:relative;z-index:1}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanline{0%{top:-2px}100%{top:100%}}

/* ---- 顶部 ---- */
.admin-header{
  background:linear-gradient(180deg,rgba(28,68,130,.98),rgba(22,56,110,.95));
  padding:14px 28px;display:flex;align-items:center;gap:16px;position:relative;
  overflow:hidden;flex-wrap:wrap;border-bottom:1px solid var(--border-hover);
  box-shadow:0 2px 20px rgba(0,0,0,.3)}
.admin-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,var(--cyan) 25%,var(--blue-bright) 50%,var(--cyan) 75%,transparent 95%)}
.admin-header h1{font-family:var(--font-display);font-size:18px;color:var(--cyan);
  letter-spacing:4px;text-shadow:0 0 12px var(--cyan-glow)}
.admin-header .badge-admin{padding:3px 12px;font-size:10px;color:var(--aurora);
  border:1px solid rgba(124,92,252,.4);border-radius:3px;letter-spacing:2px;
  background:rgba(124,92,252,.08)}
.admin-header .spacer{flex:1}
.admin-header .back-btn{padding:7px 18px;border:1px solid rgba(0,212,255,.2);
  border-radius:3px;background:transparent;color:var(--text-secondary);cursor:pointer;
  font-family:inherit;font-size:13px;transition:all .25s;letter-spacing:1px;text-decoration:none}
.admin-header .back-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}

/* ---- 布局 ---- */
.admin-layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 54px)}
.admin-nav{background:linear-gradient(180deg,var(--bg-panel),var(--bg-dark));
  padding:20px 0;position:sticky;top:0;align-self:start;height:calc(100vh - 54px);overflow-y:auto;
  border-right:1px solid var(--border)}
.admin-nav::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,.06),transparent 60%);pointer-events:none}

.nav-item{display:flex;align-items:center;gap:12px;padding:14px 24px;color:var(--text-dim);
  cursor:pointer;font-size:13px;letter-spacing:2px;transition:all .25s;
  border-left:3px solid transparent;position:relative}
.nav-item:hover{color:var(--text-secondary);background:rgba(0,212,255,.03)}
.nav-item.active{color:var(--cyan);background:linear-gradient(90deg,rgba(0,212,255,.08),transparent);
  border-left-color:var(--cyan);font-weight:700;
  text-shadow:0 0 8px var(--cyan-glow)}
.nav-item .nav-icon{font-size:14px;width:20px;text-align:center;font-family:var(--font-display);opacity:.7}
.nav-section-title{padding:18px 24px 8px;font-size:10px;color:var(--text-dim);letter-spacing:3px;
  border-top:1px solid var(--divider);margin-top:8px;text-transform:uppercase}
.nav-section-title:first-child{border-top:none;margin-top:0}

.admin-main{padding:24px 28px;overflow-y:auto}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .3s}

/* ---- 通用组件 ---- */
.panel-title{font-size:16px;font-weight:700;color:var(--cyan);margin-bottom:18px;
  padding-left:14px;border-left:3px solid var(--cyan);letter-spacing:3px;display:flex;align-items:center;gap:12px;
  text-shadow:0 0 8px var(--cyan-glow)}
.panel-title .count{font-size:12px;color:var(--text-dim);font-weight:400;letter-spacing:1px}

.toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;position:relative}
.search-box input,.search-box select{width:100%;height:38px;border:1px solid var(--border);
  border-radius:var(--radius);padding:0 14px;font-size:13px;outline:none;
  background:var(--bg-input);color:var(--text-primary);font-family:inherit;transition:all .25s}
.search-box input:focus,.search-box select:focus{border-color:var(--cyan);
  box-shadow:0 0 0 3px var(--cyan-glow);background:rgba(0,212,255,.04)}
.search-box select option{background:var(--bg-dark);color:var(--text-primary)}
.search-box.with-icon input{padding-left:38px}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);font-size:14px;pointer-events:none}

.btn{padding:7px 16px;border:none;border-radius:var(--radius);font-size:12px;
  font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:1px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--cyan-dim),var(--blue));color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.3)}
.btn-primary:hover{box-shadow:0 0 16px var(--cyan-glow);filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}
.btn-danger{background:transparent;color:#ff4c6a;border:1px solid rgba(255,76,106,.3)}
.btn-danger:hover{background:rgba(255,76,106,.06);border-color:#ff4c6a}
.btn-sm{padding:4px 10px;font-size:11px}

/* 统计卡片 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow-panel);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue));opacity:.6}
.stat-card .stat-label{font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px}
.stat-card .stat-value{font-size:32px;font-weight:900;color:var(--cyan);
  font-family:var(--font-display);line-height:1;
  text-shadow:0 0 12px var(--cyan-glow)}
.stat-card .stat-sub{font-size:11px;color:var(--text-dim);margin-top:8px}

/* 表格 */
.data-table{width:100%;border-collapse:collapse;background:var(--bg-card);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-panel);font-size:12px}
.data-table thead{background:var(--bg-dark)}
.data-table th{padding:11px 14px;text-align:left;font-weight:700;color:var(--text-secondary);
  letter-spacing:1px;border-bottom:1px solid var(--border-hover);font-size:11px;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--divider);color:var(--text-primary)}
.data-table tbody tr{transition:background .15s}
.data-table tbody tr:hover{background:rgba(0,212,255,.04)}
.data-table tbody tr:last-child td{border-bottom:none}

.tag{display:inline-block;padding:2px 10px;border-radius:3px;font-size:10px;letter-spacing:1px;font-weight:700}
.tag-public{background:rgba(0,212,255,.1);color:var(--cyan)}
.tag-business{background:rgba(0,255,200,.1);color:var(--teal)}
.tag-education{background:rgba(124,92,252,.1);color:var(--aurora)}
.tag-industry{background:rgba(255,170,0,.1);color:#ffaa00}
.tag-admin{background:linear-gradient(135deg,var(--cyan-dim),var(--blue));color:#fff}
.tag-active{background:rgba(0,255,200,.08);color:var(--teal)}
.tag-stopped{background:rgba(255,255,255,.05);color:var(--text-dim)}

/* 权限矩阵 */
.access-grid{overflow-x:auto;background:var(--bg-card);border-radius:var(--radius);
  box-shadow:var(--shadow-panel);padding:18px;border:1px solid var(--border)}
.access-matrix{border-collapse:collapse;width:100%;min-width:600px}
.access-matrix th,.access-matrix td{padding:10px 8px;text-align:center;border:1px solid var(--divider);font-size:12px}
.access-matrix th{background:var(--bg-dark);color:var(--text-secondary);font-weight:700;letter-spacing:1px;font-size:11px}
.access-matrix th.row-h{background:transparent;text-align:right;padding-right:14px;border-left:none}
.access-matrix td.cell{cursor:pointer;transition:all .2s;user-select:none}
.access-matrix td.cell:hover{background:rgba(0,212,255,.06)}
.access-matrix td.cell.checked{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(46,125,255,.1));
  color:var(--cyan);font-weight:900;font-size:16px;
  box-shadow:inset 0 0 12px var(--cyan-glow)}
.access-matrix td.cell.checked::after{content:'✓'}

/* 记录卡片 */
.record-list{display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow-panel);display:flex;align-items:center;gap:16px;
  transition:all .25s}
.record-card:hover{border-color:var(--border-hover);box-shadow:0 0 16px var(--cyan-glow);transform:translateX(2px)}
.record-card .rec-no{font-family:var(--font-display);font-size:20px;color:var(--cyan);
  opacity:.2;min-width:40px;text-align:center}
.record-card .rec-info{flex:1;min-width:0}
.record-card .rec-title{font-weight:700;color:var(--text-primary);margin-bottom:4px;font-size:13px}
.record-card .rec-meta{font-size:11px;color:var(--text-dim);display:flex;gap:14px;flex-wrap:wrap}
.record-card .rec-meta span{white-space:nowrap}
.record-card .rec-actions{display:flex;gap:8px;flex-shrink:0}

/* 弹窗 - 改为右侧抽屉，不遮挡左侧内容 */
.admin-drawer{position:fixed;top:0;right:-560px;width:540px;height:100vh;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-dark));
  box-shadow:-8px 0 40px rgba(0,0,0,.3),0 0 20px var(--cyan-glow);z-index:1000;
  transition:right .3s ease;display:flex;flex-direction:column;
  border-left:2px solid var(--cyan-dim)}
.admin-drawer.show{right:0}
.admin-drawer.large{width:700px;right:-720px}
.admin-drawer.large.show{right:0}
.admin-drawer .drawer-header{padding:18px 24px;
  background:linear-gradient(180deg,rgba(28,68,130,.98),rgba(22,56,110,.95));
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-drawer .drawer-header h3{font-family:var(--font-display);font-size:15px;color:var(--cyan);letter-spacing:3px}
.admin-drawer .drawer-close{width:28px;height:28px;border:1px solid var(--border);background:transparent;
  font-size:18px;color:var(--text-dim);cursor:pointer;line-height:1;border-radius:3px;transition:all .2s}
.admin-drawer .drawer-close:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}
.admin-drawer .drawer-body{padding:22px 24px;overflow-y:auto;flex:1}
.admin-drawer .drawer-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* 抽屉背后遮罩（半透明，点击关闭） */
.admin-drawer-mask{position:fixed;inset:0;background:rgba(10,20,50,.3);
  z-index:999;display:none;transition:opacity .3s}
.admin-drawer-mask.show{display:block}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text-secondary);
  margin-bottom:5px;letter-spacing:1px}
.form-field label .hint{color:var(--text-dim);font-weight:400;font-size:10px;margin-left:6px}
.form-field input,.form-field select,.form-field textarea{width:100%;border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;font-size:13px;outline:none;
  background:var(--bg-input);color:var(--text-primary);font-family:inherit;transition:all .2s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--cyan);
  box-shadow:0 0 0 3px var(--cyan-glow);background:rgba(0,212,255,.04)}
.form-field select option{background:var(--bg-dark);color:var(--text-primary)}
.form-field textarea{resize:vertical;min-height:64px;line-height:1.5}
.form-field .checkbox-row{display:flex;align-items:center;gap:8px;height:36px}
.form-field .checkbox-row input{width:auto;accent-color:var(--cyan)}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:linear-gradient(135deg,var(--bg-panel),var(--bg-dark));
  color:var(--text-primary);padding:12px 28px;border-radius:var(--radius);font-size:13px;
  letter-spacing:1px;z-index:2000;border:1px solid var(--border-hover);
  box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 16px var(--cyan-glow);
  transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(255,76,106,.4);box-shadow:0 8px 24px rgba(0,0,0,.3),0 0 20px rgba(255,76,106,.15)}
.toast.success{border-color:rgba(0,255,200,.4);box-shadow:0 8px 24px rgba(0,0,0,.3),0 0 20px var(--teal-glow)}

.empty{text-align:center;padding:48px 20px;color:var(--text-dim);font-size:13px;letter-spacing:2px}
.loading{text-align:center;padding:40px;color:var(--text-dim);font-size:12px}

@media(max-width:900px){
  .admin-layout{grid-template-columns:1fr}
  .admin-nav{display:flex;height:auto;position:relative;overflow-x:auto;padding:8px;
    border-right:none;border-bottom:1px solid var(--border)}
  .nav-item{padding:10px 16px;border-left:none;border-bottom:3px solid transparent}
  .nav-item.active{border-left:none;border-bottom-color:var(--cyan)}
  .nav-section-title{display:none}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="admin-header">
  <h1>管理后台</h1>
  <span class="badge-admin">仅总经理</span>
  <div class="spacer"></div>
  <a class="back-btn" href="javascript:void(0)" id="backToBoard" onclick="backToBoard()">&#8592; 返回看板</a>
</div>

<div class="admin-layout">
  <nav class="admin-nav">
    <div class="nav-section-title">概览</div>
    <div class="nav-item active" data-tab="overview"><span class="nav-icon">O</span>数据概览</div>
    <div class="nav-section-title">管理</div>
    <div class="nav-item" data-tab="users"><span class="nav-icon">U</span>人员管理</div>
    <div class="nav-item" data-tab="access"><span class="nav-icon">A</span>权限分配</div>
    <div class="nav-item" data-tab="content"><span class="nav-icon">E</span>内容编辑</div>
  </nav>
  <main class="admin-main">
    <section class="tab-panel active" id="tab-overview"></section>
    <section class="tab-panel" id="tab-users"></section>
    <section class="tab-panel" id="tab-access"></section>
    <section class="tab-panel" id="tab-content"></section>
  </main>
</div>

<div class="admin-drawer-mask" id="drawerMask"></div>
<div class="admin-drawer" id="adminDrawer">
  <div class="drawer-header"><h3 id="drawerTitle"></h3><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====== 全局 ====== */
const TOKEN = new URLSearchParams(location.search).get('token') || sessionStorage.getItem('admin_token') || '';
if(TOKEN) sessionStorage.setItem('admin_token', TOKEN);
if(!TOKEN){ location.href='/'; }

function backToBoard(){
  location.href='/?token='+encodeURIComponent(TOKEN);
}

/* 颜色映射：原始暖色 → 自然柔和色 */
function mapColor(c){
  const m={'#8B1A1A':'#ffd980','#C0392B':'#ffb060','#A63A3A':'#c4b5e8','#2E7D32':'#8eecd0',
           '#1565c0':'#ffd980','#2e7d32':'#8eecd0','#7b1fa2':'#c4b5e8','#e65100':'#ffb060'};
  return m[c]||'#ffffff';
}

const ZONE_LABEL = {public:'公众战区',business:'商业战区',education:'校园战区',industry:'行业战区',all:'全部战区'};
const ZONE_CLASS = {public:'tag-public',business:'tag-business',education:'tag-education',industry:'tag-industry',all:'tag-admin'};
let DASHBOARD=null, RECORD_SCHEMA=null;

async function api(path, {method='GET', body}={}){
  const sep = path.includes('?')?'&':'?';
  const url = path + sep + 'token=' + encodeURIComponent(TOKEN);
  const opts = {method};
  if(body!==undefined){ opts.headers={'Content-Type':'application/json'}; opts.body=JSON.stringify(body); }
  const res = await fetch(url, opts);
  if(res.status===401){ location.href='/'; throw new Error('未登录'); }
  if(res.status===403){ toast('需要总经理权限','error'); throw new Error('无权限'); }
  if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.detail||'请求失败'); }
  return res.json();
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg, type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast '+type, 2400);
}
function openModal(title, bodyHTML, footerHTML, large){
  document.getElementById('drawerTitle').textContent=title;
  document.getElementById('drawerBody').innerHTML=bodyHTML;
  document.getElementById('drawerFooter').innerHTML=footerHTML||'';
  const drawer=document.getElementById('adminDrawer');
  drawer.className='admin-drawer'+(large?' large':'');
  document.getElementById('drawerMask').classList.add('show');
  drawer.classList.add('show');
}
function closeModal(){
  document.getElementById('adminDrawer').classList.remove('show');
  document.getElementById('drawerMask').classList.remove('show');
}
function closeDrawer(){closeModal();}
document.getElementById('drawerMask').addEventListener('click',closeModal);

/* Tab 切换 */
const TAB_LOADERS = {overview:loadOverview, users:loadUsers, access:loadAccess, content:loadContent};
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    item.classList.add('active');
    const tab=item.dataset.tab;
    document.getElementById('tab-'+tab).classList.add('active');
    TAB_LOADERS[tab]();
  });
});

/* ====== 数据概览 ====== */
async function loadOverview(){
  const el=document.getElementById('tab-overview');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    DASHBOARD = await api('/api/admin/dashboard');
    const zu = DASHBOARD.zone_users;
    el.innerHTML=`
      <div class="panel-title">数据概览</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">在册人员</div><div class="stat-value">${DASHBOARD.users}</div><div class="stat-sub">个岗位账号</div></div>
        <div class="stat-card"><div class="stat-label">部署记录</div><div class="stat-value">${DASHBOARD.records}</div><div class="stat-sub">条业务数据</div></div>
        <div class="stat-card"><div class="stat-label">权限规则</div><div class="stat-value">${DASHBOARD.access_rules}</div><div class="stat-sub">条授权关系</div></div>
        <div class="stat-card"><div class="stat-label">战役数</div><div class="stat-value">${DASHBOARD.battles.length}</div><div class="stat-sub">个战役</div></div>
      </div>
      <div class="panel-title">各战区人员分布</div>
      <div class="stat-grid">
        ${DASHBOARD.warzones.map(w=>`
          <div class="stat-card"><div class="stat-label">${esc(w.name)}</div><div class="stat-value">${zu[w.id]||0}</div><div class="stat-sub">人</div></div>
        `).join('')}
      </div>
      <div class="panel-title">战役清单</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
        ${DASHBOARD.battles.map(b=>`<div style="background:var(--bg-card);border:1px solid var(--border);border-left:3px solid ${mapColor(b.color)};padding:12px 16px;border-radius:var(--radius)"><div style="font-weight:700;color:${mapColor(b.color)}">${esc(b.name)}</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">编号 ${esc(b.id)}</div></div>`).join('')}
      </div>`;
  }catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

/* ====== 人员管理 ====== */
let USERS_STATE = {q:'', zone:''};

async function loadUsers(){
  const el=document.getElementById('tab-users');
  el.innerHTML=`
    <div class="panel-title">人员管理 <span class="count" id="usersCount"></span></div>
    <div class="toolbar">
      <div class="search-box with-icon"><span class="icon">&#128269;</span><input id="userQ" placeholder="搜索姓名 / 岗位 / 电话 / 账号" value="${esc(USERS_STATE.q)}"></div>
      <select id="userZone" style="width:150px;height:38px;border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;background:var(--bg-input);color:var(--text-primary);font-family:inherit">
        <option value="">全部战区</option>
        <option value="public"${USERS_STATE.zone==='public'?' selected':''}>公众战区</option>
        <option value="business"${USERS_STATE.zone==='business'?' selected':''}>商业战区</option>
        <option value="education"${USERS_STATE.zone==='education'?' selected':''}>校园战区</option>
        <option value="industry"${USERS_STATE.zone==='industry'?' selected':''}>行业战区</option>
      </select>
      <button class="btn btn-primary" onclick="fetchUsers()">搜索</button>
      <button class="btn btn-ghost" onclick="openUserEdit(null)">+ 新增人员</button>
    </div>
    <div id="usersTable"><div class="loading">加载中...</div></div>`;
  document.getElementById('userQ').addEventListener('keydown',e=>{if(e.key==='Enter')fetchUsers();});
  document.getElementById('userZone').addEventListener('change',()=>{USERS_STATE.zone=document.getElementById('userZone').value;fetchUsers();});
  fetchUsers();
}

async function fetchUsers(){
  const q=document.getElementById('userQ').value.trim();
  USERS_STATE.q=q;
  const params=new URLSearchParams({q, zone:USERS_STATE.zone});
  try{
    const data=await api('/api/admin/users?'+params.toString());
    document.getElementById('usersCount').textContent='共 '+data.total+' 人';
    const tb=document.getElementById('usersTable');
    if(!data.users.length){ tb.innerHTML='<div class="empty">无匹配人员</div>'; return; }
    tb.innerHTML=`
      <table class="data-table">
        <thead><tr><th>姓名</th><th>岗位</th><th>战区</th><th>电话</th><th>登录账号</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${data.users.map(u=>`
          <tr>
            <td style="font-weight:700">${esc(u.name)}</td>
            <td>${esc(u.role_name)}</td>
            <td><span class="tag ${ZONE_CLASS[u.zone]||''}">${esc(ZONE_LABEL[u.zone]||u.zone_name)}</span></td>
            <td style="color:var(--text-dim)">${esc(u.phone||'—')}</td>
            <td style="font-size:11px;color:var(--text-dim)">${esc(u.username)}</td>
            <td>${u.is_admin?'<span class="tag tag-admin">管理员</span>':'<span style="color:var(--text-dim)">普通</span>'}</td>
            <td>${u.is_active?'<span class="tag tag-active">在用</span>':'<span class="tag tag-stopped">停用</span>'}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="openUserEdit(${u.id})">编辑</button>
              ${u.is_active?`<button class="btn btn-danger btn-sm" onclick="stopUser(${u.id},'${esc(u.name)}')">停用</button>`:''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }catch(e){ document.getElementById('usersTable').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function openUserEdit(uid){
  let u=null;
  if(uid){
    const all=await api('/api/admin/users?q=');
    u=all.users.find(x=>x.id===uid);
    if(!u){toast('人员不存在','error');return;}
  }
  const zones=Object.entries(ZONE_LABEL).filter(([k])=>k!=='all');
  openModal(uid?'编辑人员':'新增人员', `
    <div class="form-grid">
      <div class="form-field"><label>姓名</label><input id="f_name" value="${esc(u?.name||'')}"></div>
      <div class="form-field"><label>岗位名称</label><input id="f_role_name" value="${esc(u?.role_name||'')}"></div>
      <div class="form-field"><label>电话 <span class="hint">（暂未用于登录）</span></label><input id="f_phone" value="${esc(u?.phone||'')}"></div>
      <div class="form-field"><label>所属战区</label><select id="f_zone">${zones.map(([k,v])=>`<option value="${k}"${u?.zone===k?' selected':''}>${v}</option>`).join('')}</select></div>
      <div class="form-field"><label>登录账号 <span class="hint">${uid?'留空不修改':'默认同岗位'}</span></label><input id="f_username" value="${esc(u?.username||'')}" ${uid?'':'placeholder="默认同岗位名"'}></div>
      <div class="form-field"><label>密码 <span class="hint">${uid?'留空不修改':'默认 123456'}</span></label><input id="f_password" type="password" placeholder="留空不修改"></div>
      <div class="form-field full"><div class="checkbox-row"><input id="f_admin" type="checkbox" ${u?.is_admin?'checked':''}> <label for="f_admin" style="margin:0">设为总经理（可访问全部数据与管理后台）</label></div></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveUser(${uid||0})">保存</button>`);
}

async function saveUser(uid){
  const body={
    name:document.getElementById('f_name').value.trim(),
    role_name:document.getElementById('f_role_name').value.trim(),
    phone:document.getElementById('f_phone').value.trim(),
    zone:document.getElementById('f_zone').value,
    username:document.getElementById('f_username').value.trim(),
    password:document.getElementById('f_password').value,
    is_admin:document.getElementById('f_admin').checked,
  };
  if(!body.name||!body.role_name){toast('姓名与岗位必填','error');return;}
  try{
    if(uid) await api('/api/admin/users/'+uid,{method:'PUT',body});
    else{
      if(!body.username) body.username=body.role_name;
      await api('/api/admin/users',{method:'POST',body});
    }
    toast(uid?'已更新':'已新增','success'); closeModal(); fetchUsers();
  }catch(e){toast(e.message,'error');}
}

async function stopUser(uid,name){
  if(!confirm('确认停用「'+name+'」？停用后该账号无法登录。'))return;
  try{ await api('/api/admin/users/'+uid,{method:'DELETE'}); toast('已停用','success'); fetchUsers(); }
  catch(e){toast(e.message,'error');}
}

/* ====== 权限分配 ====== */
let ACCESS_STATE={role_id:'',battles:[],warzones:[],granted:new Set(),roles:[]};

async function loadAccess(){
  const el=document.getElementById('tab-access');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    const data=await api('/api/admin/access');
    ACCESS_STATE.battles=data.battles; ACCESS_STATE.warzones=data.warzones; ACCESS_STATE.roles=data.roles;
    el.innerHTML=`
      <div class="panel-title">权限分配</div>
      <div class="toolbar">
        <div class="search-box"><select id="accessRole" onchange="selectRole(this.value)">
          <option value="">— 选择岗位 —</option>
          ${data.roles.map(r=>`<option value="${esc(r.role_id)}">${esc(r.role_name)}（${esc(r.zone_name)}）</option>`).join('')}
        </select></div>
      </div>
      <div id="accessBox" style="margin-top:12px"><div class="empty">请先选择一个岗位</div></div>`;
    if(ACCESS_STATE.role_id){ document.getElementById('accessRole').value=ACCESS_STATE.role_id; selectRole(ACCESS_STATE.role_id); }
  }catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function selectRole(roleId){
  ACCESS_STATE.role_id=roleId;
  const box=document.getElementById('accessBox');
  if(!roleId){ box.innerHTML='<div class="empty">请先选择一个岗位</div>'; return; }
  box.innerHTML='<div class="loading">加载权限...</div>';
  try{
    const d=await api('/api/admin/access?role_id='+encodeURIComponent(roleId));
    ACCESS_STATE.granted=new Set((d.granted||[]).map(g=>g[0]+'|'+g[1]));
    renderMatrix();
  }catch(e){ box.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

function renderMatrix(){
  const box=document.getElementById('accessBox');
  const bs=ACCESS_STATE.battles, ws=ACCESS_STATE.warzones;
  let html=`<div class="access-grid">
    <table class="access-matrix">
      <thead><tr><th class="row-h">战役 \\ 战区</th>${ws.map(w=>`<th style="color:${mapColor(w.color)}">${esc(w.name)}</th>`).join('')}</tr></thead>
      <tbody>
        ${bs.map(b=>`<tr><th class="row-h" style="color:${mapColor(b.color)}">${esc(b.name)}</th>
          ${ws.map(w=>{const k=b.id+'|'+w.id;return `<td class="cell${ACCESS_STATE.granted.has(k)?' checked':''}" onclick="toggleCell('${b.id}','${w.id}')"></td>`;}).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text-dim)">共 ${ACCESS_STATE.granted.size} 个授权</span>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll(true)">全选</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll(false)">全不选</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="saveAccess()">保存权限</button>
    </div>
  </div>`;
  box.innerHTML=html;
}

function toggleCell(bid,wid){
  const k=bid+'|'+wid;
  if(ACCESS_STATE.granted.has(k)) ACCESS_STATE.granted.delete(k); else ACCESS_STATE.granted.add(k);
  const cells=document.querySelectorAll('#accessBox .cell');
  const bs=ACCESS_STATE.battles, ws=ACCESS_STATE.warzones;
  cells.forEach((c,i)=>{
    const b=Math.floor(i/ws.length), w=i%ws.length;
    const key=bs[b].id+'|'+ws[w].id;
    c.classList.toggle('checked', ACCESS_STATE.granted.has(key));
  });
  const cnt=document.querySelector('#accessBox span');
  if(cnt) cnt.textContent='共 '+ACCESS_STATE.granted.size+' 个授权';
}

function toggleAll(on){
  if(on){
    ACCESS_STATE.battles.forEach(b=>ACCESS_STATE.warzones.forEach(w=>ACCESS_STATE.granted.add(b.id+'|'+w.id)));
  }else{ ACCESS_STATE.granted.clear(); }
  renderMatrix();
}

async function saveAccess(){
  if(!ACCESS_STATE.role_id){toast('请先选择岗位','error');return;}
  const grants=[...ACCESS_STATE.granted].map(k=>{const[b,w]=k.split('|');return{battle_id:b,warzone_id:w};});
  try{
    await api('/api/admin/access',{method:'PUT',body:{role_id:ACCESS_STATE.role_id,grants}});
    toast('权限已保存（'+grants.length+' 条）','success');
  }catch(e){toast(e.message,'error');}
}

/* ====== 内容编辑 ====== */
let CONTENT_STATE={battle_id:'',zone_id:''};

async function loadContent(){
  const el=document.getElementById('tab-content');
  if(!RECORD_SCHEMA){
    try{ RECORD_SCHEMA=await api('/api/admin/record-schema'); }
    catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; return; }
  }
  el.innerHTML=`
    <div class="panel-title">内容编辑 <span class="count" id="recCount"></span></div>
    <div class="toolbar">
      <select id="fltBattle" style="height:38px;border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;background:var(--bg-input);color:var(--text-primary);font-family:inherit;min-width:150px">
        <option value="">全部战役</option>
        ${RECORD_SCHEMA.battles.map(b=>`<option value="${b.id}"${CONTENT_STATE.battle_id===b.id?' selected':''}>${esc(b.name)}</option>`).join('')}
      </select>
      <select id="fltZone" style="height:38px;border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;background:var(--bg-input);color:var(--text-primary);font-family:inherit;min-width:130px">
        <option value="">全部战区</option>
        ${RECORD_SCHEMA.warzones.map(w=>`<option value="${w.id}"${CONTENT_STATE.zone_id===w.id?' selected':''}>${esc(w.name)}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="fetchRecords()">筛选</button>
      <button class="btn btn-ghost" onclick="openRecordEdit(null)">+ 新增记录</button>
    </div>
    <div id="recordList"><div class="loading">加载中...</div></div>`;
  document.getElementById('fltBattle').addEventListener('change',()=>{CONTENT_STATE.battle_id=document.getElementById('fltBattle').value;});
  document.getElementById('fltZone').addEventListener('change',()=>{CONTENT_STATE.zone_id=document.getElementById('fltZone').value;});
  fetchRecords();
}

async function fetchRecords(){
  const p=new URLSearchParams();
  if(CONTENT_STATE.battle_id)p.set('battle_id',CONTENT_STATE.battle_id);
  if(CONTENT_STATE.zone_id)p.set('zone_id',CONTENT_STATE.zone_id);
  try{
    const d=await api('/api/admin/records?'+p.toString());
    document.getElementById('recCount').textContent='共 '+d.total+' 条';
    const el=document.getElementById('recordList');
    if(!d.records.length){ el.innerHTML='<div class="empty">无记录，点击"新增记录"添加</div>'; return; }
    const showFields=['battle_name','warzone_name','path_no','path_name','scene_no','scene_title','guide_role','combat_role'];
    el.innerHTML=`
      <table class="data-table">
        <thead><tr>
          <th>ID</th>${showFields.map(k=>{const f=RECORD_SCHEMA.fields.find(x=>x.key===k);return '<th>'+(f?f.label:k)+'</th>';}).join('')}<th>操作</th>
        </tr></thead>
        <tbody>${d.records.map(r=>`
          <tr>
            <td style="color:var(--text-dim);font-size:11px">${r.id}</td>
            ${showFields.map(k=>{
              const v=String(r[k]||'').trim();
              const short=v.length>28?v.slice(0,28)+'...':v;
              return '<td title="'+esc(v)+'" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(short?esc(short):'<span style="color:var(--text-dim)">—</span>')+'</td>';
            }).join('')}
            <td style="white-space:nowrap">
              <button class="btn btn-ghost btn-sm" onclick="openRecordEdit(${r.id})">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="delRecord(${r.id})">删除</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }catch(e){ document.getElementById('recordList').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function openRecordEdit(rid){
  let rec={};
  if(rid){
    const d=await api('/api/admin/records');
    rec=d.records.find(r=>r.id===rid)||{};
  }
  const fs=RECORD_SCHEMA.fields;
  const zs=RECORD_SCHEMA.warzones;
  const formHTML=`<div class="form-grid">${fs.map(f=>{
    const val=rec[f.key]??'';
    if(f.type==='select_warzone'){
      return `<div class="form-field full"><label>${esc(f.label)}</label><select id="rf_${f.key}"><option value="">— 请选择 —</option>${zs.map(z=>`<option value="${esc(z.name)}" ${val===z.name?'selected':''}>${esc(z.name)}</option>`).join('')}</select></div>`;
    }
    if(f.type==='textarea'){
      return `<div class="form-field full"><label>${esc(f.label)}</label><textarea id="rf_${f.key}">${esc(val)}</textarea></div>`;
    }
    return `<div class="form-field"><label>${esc(f.label)}</label><input id="rf_${f.key}" value="${esc(val)}"></div>`;
  }).join('')}</div>`;
  openModal(rid?'编辑记录 #'+rid:'新增记录', formHTML,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveRecord(${rid||0})">${rid?'保存修改':'创建'}</button>`, true);
}

async function saveRecord(rid){
  const body={};
  RECORD_SCHEMA.fields.forEach(f=>{ body[f.key]=document.getElementById('rf_'+f.key).value.trim(); });
  if(!body.battle_name){toast('战役名称必填','error');return;}
  try{
    if(rid) await api('/api/admin/records/'+rid,{method:'PUT',body});
    else await api('/api/admin/records',{method:'POST',body});
    toast(rid?'已保存':'已创建','success'); closeModal(); fetchRecords();
  }catch(e){toast(e.message,'error');}
}

async function delRecord(rid){
  if(!confirm('确认删除记录 #'+rid+'？此操作不可恢复。'))return;
  try{ await api('/api/admin/records/'+rid,{method:'DELETE'}); toast('已删除','success'); fetchRecords(); }
  catch(e){toast(e.message,'error');}
}

/* 启动 */
loadOverview();
</script>
</body>
