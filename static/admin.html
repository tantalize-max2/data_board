<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 夏收行动标准化穿透部署</title>
<link rel="stylesheet" href="/static/css/admin.css">
<style>
.watermark-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;overflow:visible}
.watermark-layer .wm-item{position:absolute;font-size:20px;font-weight:700;color:rgba(255,255,255,.15);
  white-space:nowrap;transform:translate(-50%,-50%) rotate(-30deg);user-select:none;letter-spacing:2px;
  text-shadow:0 0 1px rgba(0,0,0,.5)}
.watermark-layer:empty{display:none!important}
</style>
</head>
<body>

<div class="admin-header">
  <h1>管理后台</h1>
  <span class="badge-admin">仅总经理</span>
  <div class="spacer"></div>
  <a class="back-btn" href="javascript:void(0)" id="backToBoard" onclick="backToBoard()">&#8592; 返回看板</a>
</div>

<div class="admin-layout">
  <nav class="admin-nav">
    <div class="nav-section-title">概览</div>
    <div class="nav-item active" data-tab="overview"><span class="nav-icon">O</span>数据概览</div>
    <div class="nav-section-title">管理</div>
    <div class="nav-item" data-tab="users"><span class="nav-icon">U</span>人员管理</div>
    <div class="nav-item" data-tab="access"><span class="nav-icon">A</span>权限分配</div>
    <div class="nav-item" data-tab="content"><span class="nav-icon">E</span>内容编辑</div>
  </nav>
  <main class="admin-main">
    <section class="tab-panel active" id="tab-overview"></section>
    <section class="tab-panel" id="tab-users"></section>
    <section class="tab-panel" id="tab-access"></section>
    <section class="tab-panel" id="tab-content"></section>
  </main>
</div>

<div class="admin-drawer-mask" id="drawerMask"></div>
<div class="admin-drawer" id="adminDrawer">
  <div class="drawer-header"><h3 id="drawerTitle"></h3><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 确认弹窗 -->
<div class="modal-mask" id="confirmMask" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;align-items:center;justify-content:center">
  <div style="background:var(--bg-card,#1a2332);border:1px solid var(--border-hover,#2a3f5c);border-radius:12px;padding:0;width:360px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.5)">
    <div style="padding:18px 22px;font-size:16px;font-weight:700;color:#fff;border-bottom:1px solid var(--border-hover,#2a3f5c)" id="confirmTitle">确认操作</div>
    <div style="padding:22px;font-size:14px;color:var(--text-secondary,#a0b4cc);line-height:1.6" id="confirmMsg"></div>
    <div style="padding:0 22px 18px;display:flex;gap:10px;justify-content:flex-end">
      <button id="confirmNoBtn" style="padding:8px 22px;border-radius:6px;border:1px solid var(--border-hover,#2a3f5c);background:transparent;color:var(--text-secondary,#a0b4cc);cursor:pointer;font-size:13px" onclick="closeAdminConfirm()">取消</button>
      <button id="confirmYesBtn" style="padding:8px 22px;border-radius:6px;border:none;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;cursor:pointer;font-size:13px;font-weight:600" onclick="execAdminConfirm()">确认</button>
    </div>
  </div>
</div>

<!-- 水印层 -->
<div class="watermark-layer" id="watermarkLayer"></div>

<script src="/static/js/admin.js"></script>
</body>
</html>
