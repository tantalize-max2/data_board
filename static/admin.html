<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏收看板 · 管理后台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink-red:#8B1A1A;--ink-red-light:#A63A3A;--ink-dark:#1C1C1C;--ink-mid:#3E3E3E;
  --ink-gray:#7A7A7A;--ink-light:#C8C0B0;--paper:#F5F0E6;--paper-light:#FBF8F0;
  --paper-dark:#EDE5D4;--cinnabar:#C0392B;
  --line:rgba(28,28,28,.08);--line-strong:rgba(28,28,28,.15);
  --shadow:0 3px 16px rgba(28,28,28,.10);--shadow-hover:0 8px 32px rgba(28,28,28,.18);
  --nav-bg:linear-gradient(180deg,#0d0d1a 0%,#1a1a2e 50%,#16213e 100%);
}
body{font-family:'Noto Serif SC','Microsoft YaHei',serif;background:var(--paper);color:var(--ink-dark);line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E") repeat,radial-gradient(ellipse at 10% 15%,rgba(139,26,26,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}

/* ====== 顶部 ====== */
.admin-header{background:linear-gradient(160deg,#0d0d1a,#1a1a2e,#1C2833);padding:16px 28px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;flex-wrap:wrap}
.admin-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 5%,var(--ink-red) 25%,var(--cinnabar) 50%,var(--ink-red) 75%,transparent 95%)}
.admin-header h1{font-family:'Ma Shan Zheng',serif;font-size:26px;color:#F0E6D8;letter-spacing:6px;text-shadow:0 0 12px rgba(139,26,26,.3)}
.admin-header .badge-admin{padding:3px 12px;font-size:11px;color:var(--cinnabar);border:1px solid rgba(192,57,43,.4);border-radius:3px;letter-spacing:2px;background:rgba(192,57,43,.08)}
.admin-header .spacer{flex:1}
.admin-header .back-btn{padding:7px 18px;border:1px solid rgba(240,230,216,.25);border-radius:3px;background:transparent;color:rgba(240,230,216,.7);cursor:pointer;font-family:inherit;font-size:13px;transition:all .25s;letter-spacing:1px;text-decoration:none}
.admin-header .back-btn:hover{border-color:var(--cinnabar);color:var(--cinnabar)}

/* ====== 布局 ====== */
.admin-layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 60px)}
.admin-nav{background:var(--nav-bg);padding:20px 0;position:sticky;top:0;align-self:start;height:calc(100vh - 60px);overflow-y:auto}
.admin-nav::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(139,26,26,.08),transparent 60%);pointer-events:none}
.nav-item{display:flex;align-items:center;gap:12px;padding:14px 24px;color:rgba(240,230,216,.55);cursor:pointer;font-size:14px;letter-spacing:2px;transition:all .25s;border-left:3px solid transparent;position:relative}
.nav-item:hover{color:rgba(240,230,216,.9);background:rgba(255,255,255,.03)}
.nav-item.active{color:#F0E6D8;background:linear-gradient(90deg,rgba(139,26,26,.25),transparent);border-left-color:var(--cinnabar);font-weight:700}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;font-family:'Ma Shan Zheng',serif;opacity:.8}
.nav-section-title{padding:18px 24px 8px;font-size:11px;color:rgba(240,230,216,.3);letter-spacing:3px;border-top:1px solid rgba(255,255,255,.05);margin-top:8px}
.nav-section-title:first-child{border-top:none;margin-top:0}

.admin-main{padding:24px 28px;max-width:1400px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ====== 通用组件 ====== */
.panel-title{font-size:18px;font-weight:700;color:var(--ink-red);margin-bottom:18px;padding-left:12px;border-left:4px solid var(--ink-red);letter-spacing:3px;display:flex;align-items:center;gap:12px}
.panel-title .count{font-size:13px;color:var(--ink-gray);font-weight:400;letter-spacing:1px}

.toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;position:relative}
.search-box input,.search-box select{width:100%;height:40px;border:1px solid var(--ink-light);border-radius:4px;padding:0 14px;font-size:14px;outline:none;background:#fff;font-family:inherit;transition:all .25s}
.search-box input:focus,.search-box select:focus{border-color:var(--ink-red);box-shadow:0 0 0 3px rgba(139,26,26,.08)}
.search-box.with-icon input{padding-left:38px}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-gray);font-size:15px;pointer-events:none}

.btn{padding:8px 18px;border:none;border-radius:4px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:1px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--ink-red),var(--cinnabar));color:#fff}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 12px rgba(139,26,26,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--ink-mid);border:1px solid var(--ink-light)}
.btn-ghost:hover{border-color:var(--ink-red);color:var(--ink-red)}
.btn-danger{background:transparent;color:#c0392b;border:1px solid rgba(192,57,43,.3)}
.btn-danger:hover{background:rgba(192,57,43,.08);border-color:var(--cinnabar)}
.btn-sm{padding:5px 12px;font-size:12px}

/* 统计卡片 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:linear-gradient(170deg,#fff,var(--paper-light));border-radius:4px;padding:20px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ink-red),var(--cinnabar));opacity:.5}
.stat-card .stat-label{font-size:12px;color:var(--ink-gray);letter-spacing:2px;margin-bottom:8px}
.stat-card .stat-value{font-size:32px;font-weight:900;color:var(--ink-red);font-family:'Ma Shan Zheng',serif;line-height:1}
.stat-card .stat-sub{font-size:12px;color:var(--ink-gray);margin-top:8px}

/* 表格 */
.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:4px;overflow:hidden;box-shadow:var(--shadow);font-size:13px}
.data-table thead{background:linear-gradient(180deg,var(--paper-dark),var(--paper))}
.data-table th{padding:12px 14px;text-align:left;font-weight:700;color:var(--ink-mid);letter-spacing:1px;border-bottom:2px solid var(--line-strong);font-size:12px;white-space:nowrap}
.data-table td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--ink-dark)}
.data-table tbody tr{transition:background .15s}
.data-table tbody tr:hover{background:rgba(139,26,26,.04)}
.data-table tbody tr:last-child td{border-bottom:none}
.tag{display:inline-block;padding:2px 10px;border-radius:3px;font-size:11px;letter-spacing:1px;font-weight:700}
.tag-public{background:rgba(21,101,192,.12);color:#1565c0}
.tag-business{background:rgba(46,125,50,.12);color:#2e7d32}
.tag-education{background:rgba(123,31,162,.12);color:#7b1fa2}
.tag-industry{background:rgba(230,81,0,.12);color:#e65100}
.tag-admin{background:linear-gradient(135deg,var(--ink-red),var(--cinnabar));color:#fff}
.tag-active{background:rgba(46,125,50,.1);color:#2e7d32}
.tag-stopped{background:rgba(0,0,0,.08);color:var(--ink-gray)}

/* 权限矩阵 */
.access-grid{overflow-x:auto;background:#fff;border-radius:4px;box-shadow:var(--shadow);padding:18px}
.access-matrix{border-collapse:collapse;width:100%;min-width:600px}
.access-matrix th,.access-matrix td{padding:10px 8px;text-align:center;border:1px solid var(--line);font-size:13px}
.access-matrix th{background:var(--paper-dark);color:var(--ink-mid);font-weight:700;letter-spacing:1px;font-size:12px}
.access-matrix th.row-h{background:transparent;text-align:right;padding-right:14px;border-left:none}
.access-matrix td.cell{cursor:pointer;transition:all .2s;user-select:none}
.access-matrix td.cell:hover{background:rgba(139,26,26,.06)}
.access-matrix td.cell.checked{background:linear-gradient(135deg,rgba(139,26,26,.15),rgba(192,57,43,.1));color:var(--ink-red);font-weight:900;font-size:16px}
.access-matrix td.cell.checked::after{content:'✓'}

/* 记录卡片 */
.record-list{display:flex;flex-direction:column;gap:12px}
.record-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:all .25s}
.record-card:hover{box-shadow:var(--shadow-hover);border-color:rgba(139,26,26,.2);transform:translateX(2px)}
.record-card .rec-no{font-family:'Ma Shan Zheng',serif;font-size:24px;color:var(--ink-red);opacity:.3;min-width:40px;text-align:center}
.record-card .rec-info{flex:1;min-width:0}
.record-card .rec-title{font-weight:700;color:var(--ink-dark);margin-bottom:4px;font-size:14px}
.record-card .rec-meta{font-size:12px;color:var(--ink-gray);display:flex;gap:14px;flex-wrap:wrap}
.record-card .rec-meta span{white-space:nowrap}
.record-card .rec-actions{display:flex;gap:8px;flex-shrink:0}

/* 弹窗 */
.modal-mask{position:fixed;inset:0;background:rgba(13,13,26,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-mask.show{display:flex;animation:fadeIn .2s}
.modal{background:linear-gradient(170deg,var(--paper-light),var(--paper));border-radius:6px;width:100%;max-width:640px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.4);border:1px solid rgba(139,26,26,.15)}
.modal.large{max-width:880px}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--line-strong);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,var(--paper-dark),transparent)}
.modal-header h3{font-family:'Ma Shan Zheng',serif;font-size:22px;color:var(--ink-red);letter-spacing:4px}
.modal-close{width:30px;height:30px;border:none;background:transparent;font-size:22px;color:var(--ink-gray);cursor:pointer;line-height:1;border-radius:3px;transition:all .2s}
.modal-close:hover{background:rgba(192,57,43,.1);color:var(--cinnabar)}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--line-strong);display:flex;justify-content:flex-end;gap:10px;background:linear-gradient(0deg,var(--paper-dark),transparent)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid .full{grid-column:1/-1}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:700;color:var(--ink-mid);margin-bottom:5px;letter-spacing:1px}
.form-field label .hint{color:var(--ink-gray);font-weight:400;font-size:11px;margin-left:6px}
.form-field input,.form-field select,.form-field textarea{width:100%;border:1px solid var(--ink-light);border-radius:4px;padding:8px 12px;font-size:14px;outline:none;background:#fff;font-family:inherit;transition:all .2s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--ink-red);box-shadow:0 0 0 3px rgba(139,26,26,.06)}
.form-field textarea{resize:vertical;min-height:64px;line-height:1.5}
.form-field .checkbox-row{display:flex;align-items:center;gap:8px;height:36px}
.form-field .checkbox-row input{width:auto}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,var(--ink-dark),#2C2C2C);color:#F0E6D8;padding:12px 28px;border-radius:4px;font-size:14px;letter-spacing:1px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .3s;border:1px solid rgba(139,26,26,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:linear-gradient(135deg,#8B1A1A,var(--cinnabar))}
.toast.success{background:linear-gradient(135deg,#1B5E20,#2e7d32)}

.empty{text-align:center;padding:48px 20px;color:var(--ink-light);font-size:14px;letter-spacing:2px}
.loading{text-align:center;padding:40px;color:var(--ink-gray);font-size:13px}

@media(max-width:900px){
  .admin-layout{grid-template-columns:1fr}
  .admin-nav{display:flex;height:auto;position:relative;overflow-x:auto;padding:8px}
  .nav-item{padding:10px 16px;border-left:none;border-bottom:3px solid transparent}
  .nav-item.active{border-left:none;border-bottom-color:var(--cinnabar)}
  .nav-section-title{display:none}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="admin-header">
  <h1>夏收看板 · 管理后台</h1>
  <span class="badge-admin">仅总经理</span>
  <div class="spacer"></div>
  <a class="back-btn" href="/" id="backToBoard">&#8592; 返回看板</a>
</div>

<div class="admin-layout">
  <nav class="admin-nav">
    <div class="nav-section-title">概览</div>
    <div class="nav-item active" data-tab="overview"><span class="nav-icon">概</span>数据概览</div>
    <div class="nav-section-title">管理</div>
    <div class="nav-item" data-tab="users"><span class="nav-icon">人</span>人员管理</div>
    <div class="nav-item" data-tab="access"><span class="nav-icon">权</span>权限分配</div>
    <div class="nav-item" data-tab="content"><span class="nav-icon">编</span>内容编辑</div>
  </nav>
  <main class="admin-main">
    <section class="tab-panel active" id="tab-overview"></section>
    <section class="tab-panel" id="tab-users"></section>
    <section class="tab-panel" id="tab-access"></section>
    <section class="tab-panel" id="tab-content"></section>
  </main>
</div>

<div class="modal-mask" id="modalMask">
  <div class="modal" id="modalBox">
    <div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====== 全局 ====== */
const TOKEN = new URLSearchParams(location.search).get('token') || sessionStorage.getItem('admin_token') || '';
if(TOKEN) sessionStorage.setItem('admin_token', TOKEN);
if(!TOKEN){ location.href='/'; }

const ZONE_LABEL = {public:'公众战区',business:'商业战区',education:'教科战区',industry:'行业战区',all:'全部战区'};
const ZONE_CLASS = {public:'tag-public',business:'tag-business',education:'tag-education',industry:'tag-industry',all:'tag-admin'};
let DASHBOARD=null, RECORD_SCHEMA=null;

async function api(path, {method='GET', body}={}){
  const sep = path.includes('?')?'&':'?';
  const url = path + sep + 'token=' + encodeURIComponent(TOKEN);
  const opts = {method};
  if(body!==undefined){ opts.headers={'Content-Type':'application/json'}; opts.body=JSON.stringify(body); }
  const res = await fetch(url, opts);
  if(res.status===401){ location.href='/'; throw new Error('未登录'); }
  if(res.status===403){ toast('需要总经理权限','error'); throw new Error('无权限'); }
  if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.detail||'请求失败'); }
  return res.json();
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg, type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast '+type, 2400);
}
function openModal(title, bodyHTML, footerHTML, large){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHTML;
  document.getElementById('modalFooter').innerHTML=footerHTML||'';
  document.getElementById('modalBox').className='modal'+(large?' large':'');
  document.getElementById('modalMask').classList.add('show');
}
function closeModal(){document.getElementById('modalMask').classList.remove('show');}
document.getElementById('modalMask').addEventListener('click',e=>{if(e.target.id==='modalMask')closeModal();});

/* Tab 切换 */
const TAB_LOADERS = {overview:loadOverview, users:loadUsers, access:loadAccess, content:loadContent};
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    item.classList.add('active');
    const tab=item.dataset.tab;
    document.getElementById('tab-'+tab).classList.add('active');
    TAB_LOADERS[tab]();
  });
});

/* ====== 数据概览 ====== */
async function loadOverview(){
  const el=document.getElementById('tab-overview');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    DASHBOARD = await api('/api/admin/dashboard');
    const zu = DASHBOARD.zone_users;
    el.innerHTML=`
      <div class="panel-title">数据概览</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">在册人员</div><div class="stat-value">${DASHBOARD.users}</div><div class="stat-sub">个岗位账号</div></div>
        <div class="stat-card"><div class="stat-label">部署记录</div><div class="stat-value">${DASHBOARD.records}</div><div class="stat-sub">条业务数据</div></div>
        <div class="stat-card"><div class="stat-label">权限规则</div><div class="stat-value">${DASHBOARD.access_rules}</div><div class="stat-sub">条授权关系</div></div>
        <div class="stat-card"><div class="stat-label">战役数</div><div class="stat-value">${DASHBOARD.battles.length}</div><div class="stat-sub">个战役</div></div>
      </div>
      <div class="panel-title">各战区人员分布</div>
      <div class="stat-grid">
        ${DASHBOARD.warzones.map(w=>`
          <div class="stat-card"><div class="stat-label">${esc(w.name)}</div><div class="stat-value">${zu[w.id]||0}</div><div class="stat-sub">人</div></div>
        `).join('')}
      </div>
      <div class="panel-title">战役清单</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
        ${DASHBOARD.battles.map(b=>`<div style="background:#fff;border:1px solid var(--line);border-left:4px solid ${b.color};padding:12px 16px;border-radius:3px"><div style="font-weight:700;color:${b.color}">${esc(b.name)}</div><div style="font-size:11px;color:var(--ink-gray);margin-top:4px">编号 ${esc(b.id)}</div></div>`).join('')}
      </div>`;
  }catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

/* ====== 人员管理 ====== */
let USERS_STATE = {q:'', zone:''};

async function loadUsers(){
  const el=document.getElementById('tab-users');
  el.innerHTML=`
    <div class="panel-title">人员管理 <span class="count" id="usersCount"></span></div>
    <div class="toolbar">
      <div class="search-box with-icon"><span class="icon">&#128269;</span><input id="userQ" placeholder="搜索姓名 / 岗位 / 电话 / 账号" value="${esc(USERS_STATE.q)}"></div>
      <select id="userZone" style="width:160px;height:40px;border:1px solid var(--ink-light);border-radius:4px;padding:0 12px;background:#fff;font-family:inherit">
        <option value="">全部战区</option>
        <option value="public"${USERS_STATE.zone==='public'?' selected':''}>公众战区</option>
        <option value="business"${USERS_STATE.zone==='business'?' selected':''}>商业战区</option>
        <option value="education"${USERS_STATE.zone==='education'?' selected':''}>教科战区</option>
        <option value="industry"${USERS_STATE.zone==='industry'?' selected':''}>行业战区</option>
      </select>
      <button class="btn btn-primary" onclick="fetchUsers()">搜索</button>
      <button class="btn btn-ghost" onclick="openUserEdit(null)">+ 新增人员</button>
    </div>
    <div id="usersTable"><div class="loading">加载中...</div></div>`;
  document.getElementById('userQ').addEventListener('keydown',e=>{if(e.key==='Enter')fetchUsers();});
  document.getElementById('userZone').addEventListener('change',()=>{USERS_STATE.zone=document.getElementById('userZone').value;fetchUsers();});
  fetchUsers();
}

async function fetchUsers(){
  const q=document.getElementById('userQ').value.trim();
  USERS_STATE.q=q;
  const params=new URLSearchParams({q, zone:USERS_STATE.zone});
  try{
    const data=await api('/api/admin/users?'+params.toString());
    document.getElementById('usersCount').textContent='共 '+data.total+' 人';
    const tb=document.getElementById('usersTable');
    if(!data.users.length){ tb.innerHTML='<div class="empty">无匹配人员</div>'; return; }
    tb.innerHTML=`
      <table class="data-table">
        <thead><tr><th>姓名</th><th>岗位</th><th>战区</th><th>电话</th><th>登录账号</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${data.users.map(u=>`
          <tr>
            <td style="font-weight:700">${esc(u.name)}</td>
            <td>${esc(u.role_name)}</td>
            <td><span class="tag ${ZONE_CLASS[u.zone]||''}">${esc(ZONE_LABEL[u.zone]||u.zone_name)}</span></td>
            <td style="color:var(--ink-gray)">${esc(u.phone||'—')}</td>
            <td style="font-size:12px;color:var(--ink-gray)">${esc(u.username)}</td>
            <td>${u.is_admin?'<span class="tag tag-admin">管理员</span>':'<span style="color:var(--ink-gray)">普通</span>'}</td>
            <td>${u.is_active?'<span class="tag tag-active">在用</span>':'<span class="tag tag-stopped">停用</span>'}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="openUserEdit(${u.id})">编辑</button>
              ${u.is_active?`<button class="btn btn-danger btn-sm" onclick="stopUser(${u.id},'${esc(u.name)}')">停用</button>`:''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }catch(e){ document.getElementById('usersTable').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function openUserEdit(uid){
  let u=null;
  if(uid){
    const all=await api('/api/admin/users?q=');
    u=all.users.find(x=>x.id===uid);
    if(!u){toast('人员不存在','error');return;}
  }
  const zones=Object.entries(ZONE_LABEL).filter(([k])=>k!=='all');
  openModal(uid?'编辑人员':'新增人员', `
    <div class="form-grid">
      <div class="form-field"><label>姓名</label><input id="f_name" value="${esc(u?.name||'')}"></div>
      <div class="form-field"><label>岗位名称</label><input id="f_role_name" value="${esc(u?.role_name||'')}"></div>
      <div class="form-field"><label>电话 <span class="hint">（暂未用于登录）</span></label><input id="f_phone" value="${esc(u?.phone||'')}"></div>
      <div class="form-field"><label>所属战区</label><select id="f_zone">${zones.map(([k,v])=>`<option value="${k}"${u?.zone===k?' selected':''}>${v}</option>`).join('')}</select></div>
      <div class="form-field"><label>登录账号 <span class="hint">${uid?'留空不修改':'默认同岗位'}</span></label><input id="f_username" value="${esc(u?.username||'')}" ${uid?'':'placeholder="默认同岗位名"'}></div>
      <div class="form-field"><label>密码 <span class="hint">${uid?'留空不修改':'默认 123456'}</span></label><input id="f_password" type="password" placeholder="留空不修改"></div>
      <div class="form-field full"><div class="checkbox-row"><input id="f_admin" type="checkbox" ${u?.is_admin?'checked':''}> <label for="f_admin" style="margin:0">设为总经理（可访问全部数据与管理后台）</label></div></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveUser(${uid||0})">保存</button>`);
}

async function saveUser(uid){
  const body={
    name:document.getElementById('f_name').value.trim(),
    role_name:document.getElementById('f_role_name').value.trim(),
    phone:document.getElementById('f_phone').value.trim(),
    zone:document.getElementById('f_zone').value,
    username:document.getElementById('f_username').value.trim(),
    password:document.getElementById('f_password').value,
    is_admin:document.getElementById('f_admin').checked,
  };
  if(!body.name||!body.role_name){toast('姓名与岗位必填','error');return;}
  try{
    if(uid) await api('/api/admin/users/'+uid,{method:'PUT',body});
    else{
      if(!body.username) body.username=body.role_name;
      await api('/api/admin/users',{method:'POST',body});
    }
    toast(uid?'已更新':'已新增','success'); closeModal(); fetchUsers();
  }catch(e){toast(e.message,'error');}
}

async function stopUser(uid,name){
  if(!confirm('确认停用「'+name+'」？停用后该账号无法登录。'))return;
  try{ await api('/api/admin/users/'+uid,{method:'DELETE'}); toast('已停用','success'); fetchUsers(); }
  catch(e){toast(e.message,'error');}
}

/* ====== 权限分配 ====== */
let ACCESS_STATE={role_id:'',battles:[],warzones:[],granted:new Set(),roles:[]};

async function loadAccess(){
  const el=document.getElementById('tab-access');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    const data=await api('/api/admin/access');
    ACCESS_STATE.battles=data.battles; ACCESS_STATE.warzones=data.warzones; ACCESS_STATE.roles=data.roles;
    el.innerHTML=`
      <div class="panel-title">权限分配</div>
      <div class="toolbar">
        <div class="search-box"><select id="accessRole" onchange="selectRole(this.value)">
          <option value="">— 选择岗位 —</option>
          ${data.roles.map(r=>`<option value="${esc(r.role_id)}">${esc(r.role_name)}（${esc(r.zone_name)}）</option>`).join('')}
        </select></div>
      </div>
      <div id="accessBox" style="margin-top:12px"><div class="empty">请先选择一个岗位</div></div>`;
    if(ACCESS_STATE.role_id){ document.getElementById('accessRole').value=ACCESS_STATE.role_id; selectRole(ACCESS_STATE.role_id); }
  }catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function selectRole(roleId){
  ACCESS_STATE.role_id=roleId;
  const box=document.getElementById('accessBox');
  if(!roleId){ box.innerHTML='<div class="empty">请先选择一个岗位</div>'; return; }
  box.innerHTML='<div class="loading">加载权限...</div>';
  try{
    const d=await api('/api/admin/access?role_id='+encodeURIComponent(roleId));
    ACCESS_STATE.granted=new Set((d.granted||[]).map(g=>g[0]+'|'+g[1]));
    renderMatrix();
  }catch(e){ box.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

function renderMatrix(){
  const box=document.getElementById('accessBox');
  const bs=ACCESS_STATE.battles, ws=ACCESS_STATE.warzones;
  let html=`<div class="access-grid">
    <table class="access-matrix">
      <thead><tr><th class="row-h">战役 \\ 战区</th>${ws.map(w=>`<th style="color:${w.color}">${esc(w.name)}</th>`).join('')}</tr></thead>
      <tbody>
        ${bs.map(b=>`<tr><th class="row-h" style="color:${b.color}">${esc(b.name)}</th>
          ${ws.map(w=>{const k=b.id+'|'+w.id;return `<td class="cell${ACCESS_STATE.granted.has(k)?' checked':''}" onclick="toggleCell('${b.id}','${w.id}')"></td>`;}).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--ink-gray)">共 ${ACCESS_STATE.granted.size} 个授权</span>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll(true)">全选</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll(false)">全不选</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="saveAccess()">保存权限</button>
    </div>
  </div>`;
  box.innerHTML=html;
}

function toggleCell(bid,wid){
  const k=bid+'|'+wid;
  if(ACCESS_STATE.granted.has(k)) ACCESS_STATE.granted.delete(k); else ACCESS_STATE.granted.add(k);
  // 仅更新单元格样式，避免整表重渲染
  const cells=document.querySelectorAll('#accessBox .cell');
  const bs=ACCESS_STATE.battles, ws=ACCESS_STATE.warzones;
  cells.forEach((c,i)=>{
    const b=Math.floor(i/ws.length), w=i%ws.length;
    const key=bs[b].id+'|'+ws[w].id;
    c.classList.toggle('checked', ACCESS_STATE.granted.has(key));
  });
  // 更新计数
  const cnt=document.querySelector('#accessBox span');
  if(cnt) cnt.textContent='共 '+ACCESS_STATE.granted.size+' 个授权';
}

function toggleAll(on){
  if(on){
    ACCESS_STATE.battles.forEach(b=>ACCESS_STATE.warzones.forEach(w=>ACCESS_STATE.granted.add(b.id+'|'+w.id)));
  }else{ ACCESS_STATE.granted.clear(); }
  renderMatrix();
}

async function saveAccess(){
  if(!ACCESS_STATE.role_id){toast('请先选择岗位','error');return;}
  const grants=[...ACCESS_STATE.granted].map(k=>{const[b,w]=k.split('|');return{battle_id:b,warzone_id:w};});
  try{
    await api('/api/admin/access',{method:'PUT',body:{role_id:ACCESS_STATE.role_id,grants}});
    toast('权限已保存（'+grants.length+' 条）','success');
  }catch(e){toast(e.message,'error');}
}

/* ====== 内容编辑 ====== */
let CONTENT_STATE={battle_id:'',zone_id:''};

async function loadContent(){
  const el=document.getElementById('tab-content');
  if(!RECORD_SCHEMA){
    try{ RECORD_SCHEMA=await api('/api/admin/record-schema'); }
    catch(e){ el.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; return; }
  }
  el.innerHTML=`
    <div class="panel-title">内容编辑 <span class="count" id="recCount"></span></div>
    <div class="toolbar">
      <select id="fltBattle" style="height:40px;border:1px solid var(--ink-light);border-radius:4px;padding:0 12px;background:#fff;font-family:inherit;min-width:160px">
        <option value="">全部战役</option>
        ${RECORD_SCHEMA.battles.map(b=>`<option value="${b.id}"${CONTENT_STATE.battle_id===b.id?' selected':''}>${esc(b.name)}</option>`).join('')}
      </select>
      <select id="fltZone" style="height:40px;border:1px solid var(--ink-light);border-radius:4px;padding:0 12px;background:#fff;font-family:inherit;min-width:140px">
        <option value="">全部战区</option>
        ${RECORD_SCHEMA.warzones.map(w=>`<option value="${w.id}"${CONTENT_STATE.zone_id===w.id?' selected':''}>${esc(w.name)}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="fetchRecords()">筛选</button>
      <button class="btn btn-ghost" onclick="openRecordEdit(null)">+ 新增记录</button>
    </div>
    <div id="recordList"><div class="loading">加载中...</div></div>`;
  document.getElementById('fltBattle').addEventListener('change',()=>{CONTENT_STATE.battle_id=document.getElementById('fltBattle').value;});
  document.getElementById('fltZone').addEventListener('change',()=>{CONTENT_STATE.zone_id=document.getElementById('fltZone').value;});
  fetchRecords();
}

async function fetchRecords(){
  const p=new URLSearchParams();
  if(CONTENT_STATE.battle_id)p.set('battle_id',CONTENT_STATE.battle_id);
  if(CONTENT_STATE.zone_id)p.set('zone_id',CONTENT_STATE.zone_id);
  try{
    const d=await api('/api/admin/records?'+p.toString());
    document.getElementById('recCount').textContent='共 '+d.total+' 条';
    const el=document.getElementById('recordList');
    if(!d.records.length){ el.innerHTML='<div class="empty">无记录，点击"新增记录"添加</div>'; return; }
    el.innerHTML='<div class="record-list">'+d.records.map(r=>`
      <div class="record-card">
        <div class="rec-no">${esc(r.id)}</div>
        <div class="rec-info">
          <div class="rec-title">${esc(r.battle_name||'未命名战役')} · ${esc(r.path_name||'—')} · ${esc(r.scene_name?(r.scene_name.slice(0,20)+'...'):'（路径级）')}</div>
          <div class="rec-meta">
            <span>战区：${esc(r.warzone_name||'—')}</span>
            <span>路径：${esc(r.path_no||'—')}</span>
            <span>场景：${esc(r.scene_no||'—')}</span>
            <span>作战角色：${esc(r.combat_role||'—')}</span>
            ${r.updated_by?`<span>最后修改：${esc(r.updated_by)}</span>`:''}
          </div>
        </div>
        <div class="rec-actions">
          <button class="btn btn-ghost btn-sm" onclick="openRecordEdit(${r.id})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="delRecord(${r.id})">删除</button>
        </div>
      </div>`).join('')+'</div>';
  }catch(e){ document.getElementById('recordList').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
}

async function openRecordEdit(rid){
  let rec={};
  if(rid){
    const d=await api('/api/admin/records');
    rec=d.records.find(r=>r.id===rid)||{};
  }
  const fs=RECORD_SCHEMA.fields;
  const zs=RECORD_SCHEMA.warzones;
  const formHTML=`<div class="form-grid">${fs.map(f=>{
    const val=rec[f.key]??'';
    if(f.type==='select_warzone'){
      return `<div class="form-field full"><label>${esc(f.label)}</label><select id="rf_${f.key}"><option value="">— 请选择 —</option>${zs.map(z=>`<option value="${esc(z.name)}" ${val===z.name?'selected':''}>${esc(z.name)}</option>`).join('')}</select></div>`;
    }
    if(f.type==='textarea'){
      return `<div class="form-field full"><label>${esc(f.label)}</label><textarea id="rf_${f.key}">${esc(val)}</textarea></div>`;
    }
    return `<div class="form-field"><label>${esc(f.label)}</label><input id="rf_${f.key}" value="${esc(val)}"></div>`;
  }).join('')}</div>`;
  openModal(rid?'编辑记录 #'+rid:'新增记录', formHTML,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveRecord(${rid||0})">${rid?'保存修改':'创建'}</button>`, true);
}

async function saveRecord(rid){
  const body={};
  RECORD_SCHEMA.fields.forEach(f=>{ body[f.key]=document.getElementById('rf_'+f.key).value.trim(); });
  if(!body.battle_name){toast('战役名称必填','error');return;}
  try{
    if(rid) await api('/api/admin/records/'+rid,{method:'PUT',body});
    else await api('/api/admin/records',{method:'POST',body});
    toast(rid?'已保存':'已创建','success'); closeModal(); fetchRecords();
  }catch(e){toast(e.message,'error');}
}

async function delRecord(rid){
  if(!confirm('确认删除记录 #'+rid+'？此操作不可恢复。'))return;
  try{ await api('/api/admin/records/'+rid,{method:'DELETE'}); toast('已删除','success'); fetchRecords(); }
  catch(e){toast(e.message,'error');}
}

/* 启动 */
loadOverview();
</script>
</body>
