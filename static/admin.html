<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 夏收行动标准化穿透部署</title>
<link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<div class="admin-header">
  <h1>管理后台</h1>
  <span class="badge-admin">仅总经理</span>
  <div class="spacer"></div>
  <a class="back-btn" href="javascript:void(0)" id="backToBoard" onclick="backToBoard()">&#8592; 返回看板</a>
</div>

<div class="admin-layout">
  <nav class="admin-nav">
    <div class="nav-section-title">概览</div>
    <div class="nav-item active" data-tab="overview"><span class="nav-icon">O</span>数据概览</div>
    <div class="nav-section-title">管理</div>
    <div class="nav-item" data-tab="users"><span class="nav-icon">U</span>人员管理</div>
    <div class="nav-item" data-tab="access"><span class="nav-icon">A</span>权限分配</div>
    <div class="nav-item" data-tab="content"><span class="nav-icon">E</span>内容编辑</div>
  </nav>
  <main class="admin-main">
    <section class="tab-panel active" id="tab-overview"></section>
    <section class="tab-panel" id="tab-users"></section>
    <section class="tab-panel" id="tab-access"></section>
    <section class="tab-panel" id="tab-content"></section>
  </main>
</div>

<div class="admin-drawer-mask" id="drawerMask"></div>
<div class="admin-drawer" id="adminDrawer">
  <div class="drawer-header"><h3 id="drawerTitle"></h3><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/admin.js"></script>
</body>
</html>
