<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百日攻坚"夏收"行动标准化穿透部署</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+XiaoWei&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* ---- 深邃海洋色板（柔和自然版）---- */
  --bg-deep:#102a4a;
  --bg-dark:#1a3a6b;
  --bg-panel:#2256a0;
  --bg-card:rgba(45,90,150,.75);
  --bg-card-hover:rgba(60,115,190,.85);
  --bg-input:rgba(25,60,110,.9);

  /* 强调色：冰蓝白而非刺眼青色 */
  --cyan:#a8d5ff;
  --cyan-dim:#7fb8e8;
  --cyan-glow:rgba(168,213,255,.18);
  --cyan-bg:rgba(168,213,255,.08);
  --blue:#6ba3d8;
  --blue-bright:#9cc8f0;
  --blue-glow:rgba(107,163,216,.18);
  --blue-bg:rgba(107,163,216,.08);
  --teal:#8eecd0;
  --teal-dim:#6cd4b0;
  --teal-glow:rgba(142,236,208,.15);
  --aurora:#c4b5e8;
  --aurora-glow:rgba(196,181,232,.15);

  /* 文字色：纯白为主，避免青色文字 */
  --text-primary:#ffffff;
  --text-secondary:#e8eef5;
  --text-dim:#b8c8d8;
  --text-accent:#ffd980;

  --border:rgba(150,200,250,.25);
  --border-hover:rgba(180,220,255,.4);
  --border-active:rgba(200,235,255,.6);
  --divider:rgba(150,200,250,.12);

  --glow-sm:0 0 12px rgba(120,180,240,.12);
  --glow-md:0 0 24px rgba(120,180,240,.08);
  --glow-lg:0 0 48px rgba(120,180,240,.05);
  --shadow-panel:0 8px 32px rgba(0,8,30,.3);

  --radius:6px;
  --font-display:'ZCOOL XiaoWei','Noto Sans SC',serif;
  --font-body:'Noto Sans SC','Microsoft YaHei',sans-serif;
}

html{font-size:14px}
body{font-family:var(--font-body);background-color:var(--bg-deep);background-image:url('/static/background.png');background-size:cover;background-position:center center;background-repeat:no-repeat;background-attachment:fixed;color:var(--text-primary);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ---- 全局背景：图片蓝色遮罩（中心深→边缘透）+ 极淡网格 ---- */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at center,rgba(18,42,90,.82) 0%,rgba(18,42,90,.68) 35%,rgba(18,42,90,.5) 70%,rgba(18,42,90,.45) 100%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(0,180,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,.035) 1px,transparent 1px);
  background-size:60px 60px;
}
body>*{position:relative;z-index:1}

.page{display:none;min-height:100vh}

/* ---- 科技边角装饰 ---- */
.tech-border{position:relative;border:1px solid var(--border);border-radius:var(--radius)}
.tech-border::before,.tech-border::after{content:'';position:absolute;width:14px;height:14px;pointer-events:none}
.tech-border::before{top:-2px;left:-2px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.tech-border::after{bottom:-2px;right:-2px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

/* ---- 扫描线动画 ---- */
@keyframes scanline{0%{top:-2px}100%{top:100%}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes glow-breathe{0%,100%{box-shadow:0 0 8px var(--cyan-glow)}50%{box-shadow:0 0 20px var(--cyan-glow),0 0 40px rgba(0,212,255,.06)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}

/* ============================================================
   登录页
   ============================================================ */
.page-login{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;
  padding-top:8vh;
  background:transparent}
.page-login::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,transparent 0%,rgba(0,212,255,.02) 50%,transparent 100%);
  animation:scanline 4s linear infinite;pointer-events:none;opacity:.4}

.login-box{
  background:linear-gradient(170deg,rgba(56,136,208,.96),rgba(40,96,168,.98));
  border:1px solid var(--border-hover);border-radius:6px;padding:52px 44px;width:480px;
  box-shadow:0 0 60px rgba(46,202,255,.08),0 24px 80px rgba(0,10,40,.4);
  position:relative;overflow:hidden;
  animation:fadeIn .6s ease-out;
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--cyan),transparent)}
.login-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--aurora),var(--cyan),transparent);opacity:.5}

/* 科技角 */
.login-corner-tl,.login-corner-tr,.login-corner-bl,.login-corner-br{position:absolute;width:18px;height:18px;pointer-events:none}
.login-corner-tl{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.login-corner-tr{top:-1px;right:-1px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.login-corner-bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.login-corner-br{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

.login-box h1{text-align:center;font-size:22px;color:var(--text-primary);margin-bottom:4px;
  font-family:var(--font-display);letter-spacing:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.3)}
.login-box .sub{text-align:center;color:var(--text-secondary);font-size:12px;margin-bottom:32px;letter-spacing:4px}
.login-box .field{margin-bottom:20px}
.login-box label{display:block;font-size:12px;color:#e0f0ff;margin-bottom:6px;letter-spacing:2px;font-weight:500}
.login-box select,.login-box input{width:100%;height:46px;border:1px solid var(--border);border-radius:var(--radius);
  padding:0 14px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text-primary);
  font-family:inherit;transition:all .25s}
.login-box select:focus,.login-box input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow);background:rgba(0,212,255,.04)}
.login-box select option{background:var(--bg-dark);color:var(--text-primary)}

.login-box .btn{width:100%;height:50px;
  background:linear-gradient(135deg,var(--cyan-dim),var(--blue));
  color:#fff;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:12px;
  transition:all .3s;position:relative;overflow:hidden;
  text-shadow:0 1px 2px rgba(0,0,0,.4)}
.login-box .btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);transition:transform .5s}
.login-box .btn:hover::after{transform:translateX(100%)}
.login-box .btn:hover{box-shadow:0 0 28px var(--cyan-glow),0 4px 16px rgba(0,10,40,.3);transform:translateY(-1px)}
.login-box .error{color:#ff4c6a;font-size:12px;text-align:center;margin-top:14px;min-height:20px;letter-spacing:1px}

/* ============================================================
   通用：标题栏
   ============================================================ */
.header-bar{
  background:linear-gradient(180deg,rgba(28,68,130,.98),rgba(22,56,110,.95));
  padding:18px 28px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border-hover);
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.header-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--text-accent) 25%,var(--blue-bright) 50%,var(--text-accent) 75%,transparent 95%);opacity:.5}
.header-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-bright),transparent);opacity:.2}

.header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}

.header-title{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text-primary);letter-spacing:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.3);position:relative}
.header-title::after{content:'';position:absolute;bottom:-6px;left:0;width:60px;height:2px;
  background:linear-gradient(90deg,var(--text-accent),transparent);opacity:.7}

.header-user{display:flex;align-items:center;gap:10px}
.zone-badge{padding:3px 14px;border-radius:3px;font-size:11px;color:var(--text-accent);letter-spacing:1px;
  border:1px solid var(--border-hover);background:var(--cyan-bg)}
.role-badge{padding:4px 18px;border-radius:3px;font-size:13px;font-weight:700;color:var(--text-primary);
  letter-spacing:2px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(46,125,255,.12));
  border:1px solid rgba(0,212,255,.3)}
.btn-logout{padding:5px 16px;border:1px solid rgba(0,212,255,.2);border-radius:3px;
  background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;
  font-family:inherit;transition:all .25s;letter-spacing:1px}
.btn-logout:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}

.btn-admin{padding:5px 16px;border:1px solid rgba(124,92,252,.4);border-radius:3px;
  background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(46,125,255,.1));
  color:var(--text-primary);cursor:pointer;font-size:12px;font-family:inherit;
  transition:all .25s;letter-spacing:2px;margin-right:8px;font-weight:700}
.btn-admin:hover{background:linear-gradient(135deg,rgba(124,92,252,.3),rgba(46,125,255,.2));
  box-shadow:0 0 12px var(--aurora-glow);transform:translateY(-1px)}

/* ---- 通用：子页面头部 ---- */
.sub-header{
  background:linear-gradient(180deg,rgba(28,68,130,.98),rgba(22,56,110,.95));
  padding:16px 28px;display:flex;align-items:center;gap:12px;position:relative;
  overflow:hidden;flex-wrap:wrap;border-bottom:1px solid var(--border-hover);
  box-shadow:0 2px 16px rgba(0,0,0,.2)}
.sub-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,var(--cyan) 25%,var(--blue-bright) 50%,var(--cyan) 75%,transparent 95%)}

.back-btn{padding:7px 18px;border:1px solid rgba(0,212,255,.2);border-radius:3px;
  background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit;
  font-size:13px;transition:all .25s;white-space:nowrap;letter-spacing:1px}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}
.sub-title{font-family:var(--font-display);font-size:18px;color:var(--cyan);letter-spacing:4px;
  text-shadow:0 0 12px var(--cyan-glow)}
.sub-title-sep{color:var(--text-dim);font-size:16px}
.sub-info{margin-left:auto;font-size:12px;color:var(--text-dim);letter-spacing:1px}
.sub-body{max-width:1400px;margin:0 auto;padding:24px 28px}

/* 面包屑 */
.breadcrumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb .crumb{font-size:13px;color:var(--text-dim);cursor:pointer;transition:color .2s;letter-spacing:1px}
.breadcrumb .crumb:hover{color:var(--text-accent)}
.breadcrumb .crumb.active{color:var(--text-accent);font-weight:700;cursor:default}
.breadcrumb .sep{color:var(--text-dim);font-size:10px;opacity:.4}

/* ============================================================
   主页
   ============================================================ */
.main-body{max-width:1400px;margin:0 auto;padding:28px}

.section-label{font-size:14px;font-weight:700;color:var(--text-accent);margin-bottom:14px;
  padding-left:14px;border-left:3px solid var(--text-accent);letter-spacing:4px;position:relative}
.section-label::before{content:'';position:absolute;left:-8px;top:50%;width:8px;height:8px;
  transform:translateY(-50%) rotate(45deg);background:var(--text-accent);opacity:.4}

/* ---- 战役/战区 通用卡片网格 ---- */
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}

.card-item{
  background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;
  cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
  backdrop-filter:blur(8px)}
.card-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--text-accent),var(--blue-bright),transparent);
  opacity:.4;transition:opacity .35s}
.card-item:hover{transform:translateY(-3px);border-color:var(--border-hover);
  box-shadow:0 12px 36px rgba(0,5,25,.4),0 0 0 1px var(--border-hover);background:var(--bg-card-hover)}
.card-item:hover::before{opacity:.8}
.card-item::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,transparent,var(--cyan),transparent);opacity:.4;transition:opacity .3s}
.card-item:hover::after{opacity:1}

.card-item .card-name{font-size:18px;font-weight:700;letter-spacing:3px;margin-bottom:6px;padding-left:8px;
  text-shadow:0 0 12px currentColor,0 1px 3px rgba(0,0,0,.5)}
.card-item .card-count{font-size:12px;color:var(--text-dim);padding-left:8px;letter-spacing:1px}
.card-item .card-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:.2;transition:all .3s;color:var(--text-secondary)}
.card-item:hover .card-arrow{opacity:.6;right:14px}

/* 战区型卡片（居中无箭头） */
.card-center{text-align:center;padding:28px 20px}
.card-center .card-name{font-size:18px;font-weight:700;letter-spacing:4px;margin-bottom:6px;padding-left:0;
  text-shadow:0 1px 4px rgba(0,0,0,.4)}
.card-center .card-count{padding-left:0;color:var(--text-dim)}
.card-center::after{display:none}

/* ---- 兵种区 ---- */
.troop-overview{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;
  margin-bottom:28px;position:relative;overflow:hidden;
  backdrop-filter:blur(8px)}
.troop-overview::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--text-accent),transparent);opacity:.5}
.troop-overview .label{font-weight:700;font-size:13px;color:var(--text-accent);margin-bottom:12px;
  letter-spacing:3px;padding-left:10px;border-left:3px solid var(--text-accent)}
.troop-zones-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.troop-zone-group .tz-name{font-size:13px;font-weight:700;margin-bottom:8px;letter-spacing:2px;
  padding-bottom:4px;border-bottom:1px solid var(--divider);color:var(--text-secondary)}
.troop-zone-group .tz-roles{display:flex;flex-wrap:wrap;gap:6px}

.tz-tag{padding:4px 14px;border-radius:3px;font-size:11px;
  background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);
  cursor:default;transition:all .25s;font-family:inherit;font-weight:500;letter-spacing:1px}
.tz-tag.is-me{color:#fff;font-weight:700;border-color:transparent;
  background:linear-gradient(135deg,var(--cyan-dim),var(--blue));
  box-shadow:0 0 10px var(--cyan-glow)}
.tz-tag.clickable{cursor:pointer}
.tz-tag.clickable:hover{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);
  box-shadow:var(--glow-sm);transform:translateY(-1px)}

/* ---- 标语 ---- */
.motto-section{text-align:center;padding:28px 24px;margin:20px 0;position:relative}
.motto-section::before,.motto-section::after{content:'';position:absolute;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,217,128,.2),transparent)}
.motto-section::before{top:0}.motto-section::after{bottom:0}
.motto-text{font-family:var(--font-display);color:var(--text-accent);font-size:22px;font-weight:700;letter-spacing:6px;
  text-shadow:0 2px 6px rgba(0,0,0,.3)}
.motto-sub{color:var(--text-primary);font-size:18px;font-weight:500;letter-spacing:6px;margin-top:10px;
  text-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ---- 检索框 ---- */
.search-section{display:flex;gap:12px;margin-bottom:28px}
.search-input{flex:1;height:46px;border:1px solid var(--border);border-radius:var(--radius);
  padding:0 18px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text-primary);
  font-family:inherit;transition:all .25s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--text-accent);box-shadow:0 0 0 2px rgba(255,217,128,.15)}
.search-btn{height:46px;padding:0 32px;
  background:linear-gradient(135deg,var(--blue),var(--blue-bright));color:#fff;
  border:none;border-radius:var(--radius);font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:6px;transition:all .25s;
  text-shadow:0 1px 2px rgba(0,0,0,.3)}
.search-btn:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}

/* ---- 通用弹窗 ---- */
.modal-mask{position:fixed;inset:0;background:rgba(10,20,50,.6);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-mask.show{display:flex;animation:fadeIn .2s}
.modal-box{background:linear-gradient(170deg,var(--bg-panel),var(--bg-dark));
  border:1px solid var(--border-hover);border-radius:6px;width:100%;max-width:760px;
  max-height:84vh;display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden;
  position:relative}
.modal-box.small{max-width:520px}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--cyan),transparent)}

.modal-header{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.modal-header h3{font-family:var(--font-display);font-size:16px;color:var(--cyan);letter-spacing:3px}
.modal-close{width:28px;height:28px;border:1px solid var(--border);background:transparent;
  font-size:18px;color:var(--text-dim);cursor:pointer;border-radius:3px;transition:all .2s;line-height:1}
.modal-close:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-body .empty-state{padding:30px}

/* 检索结果条目 */
.result-item{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--cyan);
  border-radius:3px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all .25s}
.result-item:hover{border-left-color:var(--blue-bright);background:var(--bg-card-hover);
  box-shadow:0 0 12px var(--cyan-glow);transform:translateX(3px)}
.result-item.active{border-left-color:var(--blue-bright);background:linear-gradient(90deg,rgba(0,212,255,.08),transparent)}
.result-item .ri-title{font-weight:700;color:var(--text-primary);font-size:14px;margin-bottom:4px;letter-spacing:1px}
.result-item .ri-meta{font-size:11px;color:var(--text-dim);display:flex;gap:14px;flex-wrap:wrap}
.result-item .ri-meta b{color:var(--cyan);font-weight:700}

/* ---- 检索侧边抽屉 ---- */
.search-drawer{position:fixed;top:0;right:-420px;width:400px;height:100vh;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-dark));
  box-shadow:-8px 0 40px rgba(0,0,0,.3),0 0 20px var(--cyan-glow);z-index:999;
  transition:right .3s ease;display:flex;flex-direction:column;
  border-left:2px solid var(--cyan-dim)}
.search-drawer.show{right:0}
.search-drawer .drawer-header{padding:16px 20px;
  background:linear-gradient(180deg,rgba(28,68,130,.98),rgba(22,56,110,.95));
  color:var(--text-primary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  border-bottom:1px solid var(--border)}
.search-drawer .drawer-header h3{font-family:var(--font-display);font-size:14px;color:var(--cyan);letter-spacing:3px}
.search-drawer .drawer-close{width:28px;height:28px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);font-size:16px;cursor:pointer;
  border-radius:3px;transition:all .2s;line-height:1}
.search-drawer .drawer-close:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm)}
.search-drawer .drawer-count{padding:10px 20px;font-size:11px;color:var(--text-dim);letter-spacing:1px;
  border-bottom:1px solid var(--divider);background:rgba(0,212,255,.02);flex-shrink:0}
.search-drawer .drawer-body{flex:1;overflow-y:auto;padding:12px 16px}

/* 权限矩阵 */
.am-table{border-collapse:collapse;width:100%;margin-top:8px}
.am-table th,.am-table td{padding:8px 6px;text-align:center;border:1px solid var(--divider);font-size:12px}
.am-table th{background:var(--bg-card);color:var(--text-secondary);font-weight:700;letter-spacing:1px}
.am-table td.yes{background:rgba(0,212,255,.1);color:var(--cyan);font-weight:900}
.am-table td.no{color:var(--text-dim)}

/* ============================================================
   层级模块
   ============================================================ */
.module-section{margin-bottom:28px}
.module-title{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:14px;
  padding-left:12px;border-left:3px solid var(--cyan);letter-spacing:3px;position:relative;
  text-shadow:0 0 8px var(--cyan-glow)}
.module-title::before{content:'';position:absolute;left:-8px;top:50%;width:8px;height:8px;
  transform:translateY(-50%) rotate(45deg);background:var(--cyan);opacity:.3}

/* 信息卡片 */
.info-card{background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-panel);overflow:hidden;position:relative}
.info-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue),var(--cyan));opacity:.5}
.card-fields{padding:16px 20px 12px}
.field-row{display:flex;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--divider)}
.field-row:last-child{border-bottom:none}
.field-label{flex-shrink:0;width:140px;font-size:12px;color:var(--text-secondary);font-weight:700;
  letter-spacing:1px;padding-top:2px}
.field-label::after{content:'';display:inline-block;width:3px;height:12px;margin-left:8px;
  vertical-align:middle;background:linear-gradient(180deg,transparent,var(--cyan),transparent);
  opacity:.5;border-radius:2px}
.field-value{flex:1;font-size:14px;color:var(--text-primary);font-weight:700;line-height:1.7;
  word-break:break-all;letter-spacing:.5px}
.field-value.empty{color:var(--text-dim);font-style:italic;font-weight:400}

/* 路径卡片 */
.path-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.path-card{background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-panel);padding:20px 22px;cursor:pointer;transition:all .3s;
  position:relative;overflow:hidden}
.path-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue),var(--cyan));opacity:.5;transition:opacity .3s}
.path-card:hover{border-color:var(--border-hover);
  box-shadow:0 0 20px var(--cyan-glow),0 6px 20px rgba(0,0,0,.2);transform:translateY(-2px)}
.path-card:hover::before{opacity:1}
.path-card .path-name{font-size:16px;font-weight:900;color:var(--text-primary);letter-spacing:2px;margin-bottom:6px}
.path-card .path-target{font-size:12px;color:var(--text-dim);margin-bottom:8px}
.path-card .path-meta{display:flex;align-items:center;justify-content:space-between}
.path-card .path-id{font-size:11px;color:var(--text-dim);letter-spacing:1px}
.path-card .path-scenes{font-size:12px;color:var(--cyan);font-weight:700;letter-spacing:1px;
  text-shadow:0 0 6px var(--cyan-glow)}
.path-card .path-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:16px;opacity:.2;color:var(--cyan);transition:all .3s}
.path-card:hover .path-arrow{opacity:.6;right:12px;text-shadow:0 0 8px var(--cyan-glow)}

/* 场景卡片 */
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px}
.scene-card{background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-panel);overflow:hidden;position:relative;transition:all .3s}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue),var(--cyan));opacity:.5}
.scene-card:hover{border-color:var(--border-hover);
  box-shadow:0 0 20px var(--cyan-glow),0 6px 20px rgba(0,0,0,.2);transform:translateY(-2px)}
.scene-card .scene-header{padding:14px 20px 6px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--divider)}
.scene-card .scene-id{font-family:var(--font-display);font-size:24px;color:var(--cyan);
  opacity:.15;line-height:1}
.scene-card .scene-name{font-size:15px;font-weight:900;color:var(--text-primary);letter-spacing:1px;flex:1}
.scene-card .scene-fields{padding:12px 20px 16px}
.scene-card .field-label{width:160px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:14px;letter-spacing:3px}
.loading{text-align:center;padding:40px;color:var(--text-dim);font-size:13px;letter-spacing:1px}

/* ---- 悬停预览浮层 ---- */
.hover-tip{position:fixed;z-index:2000;max-width:520px;max-height:60vh;overflow-y:auto;
  background:linear-gradient(170deg,var(--bg-panel),var(--bg-dark));
  border:1px solid var(--border-hover);border-radius:6px;padding:16px 20px;
  box-shadow:0 0 40px rgba(0,212,255,.12),0 12px 40px rgba(0,0,0,.5);
  display:none;font-size:12px;line-height:1.7;
  scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent}
.hover-tip::-webkit-scrollbar{width:5px}
.hover-tip::-webkit-scrollbar-track{background:transparent}
.hover-tip::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
.hover-tip.show{display:block;animation:fadeIn .15s}
.hover-tip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--cyan),transparent)}
.hover-tip .ht-title{font-weight:700;color:var(--cyan);font-size:13px;margin-bottom:8px;
  letter-spacing:1px;padding-bottom:6px;border-bottom:1px solid var(--divider)}
.hover-tip .ht-row{display:flex;gap:8px;padding:3px 0}
.hover-tip .ht-label{flex-shrink:0;color:var(--cyan);font-weight:500;min-width:100px}
.hover-tip .ht-val{color:#fff;word-break:break-all}
.hover-tip .ht-empty{color:var(--text-dim);font-style:italic}
.hover-tip .ht-item{background:rgba(0,212,255,.06);border:1px solid var(--border);
  border-radius:4px;padding:8px 12px;margin-bottom:6px}
.hover-tip .ht-item-name{font-weight:700;color:var(--cyan);margin-bottom:4px}

/* ---- 场景模块（场景列表页） ---- */
.scene-module{background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius);
  padding:20px 22px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.scene-module::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue),var(--cyan));opacity:.5;transition:opacity .3s}
.scene-module:hover{border-color:var(--border-active);
  box-shadow:0 0 24px var(--cyan-glow),0 8px 24px rgba(0,0,0,.3);transform:translateY(-3px)}
.scene-module:hover::before{opacity:1}
.scene-module .sm-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.scene-module .sm-id{font-family:var(--font-display);font-size:20px;color:var(--cyan);opacity:.4;line-height:1}
.scene-module .sm-name{font-size:16px;font-weight:900;color:#fff;letter-spacing:1px;flex:1;
  text-shadow:0 1px 3px rgba(0,0,0,.4)}
.scene-module .sm-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.scene-module .sm-field{display:flex;gap:6px;align-items:flex-start}
.scene-module .sm-flabel{flex-shrink:0;font-size:11px;color:var(--cyan);font-weight:500;white-space:nowrap}
.scene-module .sm-fval{font-size:12px;color:#fff;word-break:break-all}
.scene-module .sm-fval.empty{color:var(--text-dim)}

/* ---- 单元模块（场景详情页） ---- */
.unit-module{background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius);
  padding:18px 20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.unit-module::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue));opacity:.5;transition:opacity .3s}
.unit-module:hover{border-color:var(--border-active);
  box-shadow:0 0 20px var(--cyan-glow),0 6px 20px rgba(0,0,0,.3);transform:translateY(-2px)}
.unit-module:hover::before{opacity:1}
.unit-module .um-label{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:8px;
  letter-spacing:1px;text-shadow:0 0 6px var(--cyan-glow)}
.unit-module .um-value{font-size:13px;color:#fff;line-height:1.6;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.unit-module .um-value.empty{color:var(--text-dim);font-style:italic}
.unit-module .um-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.2;color:var(--cyan);transition:all .3s}
.unit-module:hover .um-arrow{opacity:.6}

.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.unit-detail-card{background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius);
  padding:24px 28px;box-shadow:var(--shadow-panel);position:relative;overflow:hidden}
.unit-detail-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--blue),var(--cyan));opacity:.6}

/* ---- 响应式 ---- */
@media(max-width:1100px){.path-grid{grid-template-columns:minmax(300px,1fr)}.scene-grid{grid-template-columns:minmax(340px,1fr)}}
@media(max-width:900px){
  .card-grid-3{grid-template-columns:repeat(2,1fr)}.card-grid-4{grid-template-columns:repeat(2,1fr)}.troop-zones-grid{grid-template-columns:repeat(2,1fr)}
  .header-title{font-size:16px;letter-spacing:3px}.path-grid,.scene-grid{grid-template-columns:1fr}
  .field-label{width:110px}.scene-card .field-label{width:130px}
}
@media(max-width:600px){
  .card-grid-3,.card-grid-4,.troop-zones-grid{grid-template-columns:1fr}
  .header-title{font-size:14px;letter-spacing:2px}.header-inner{flex-direction:column;gap:10px}
  .path-grid,.scene-grid{grid-template-columns:1fr}
  .field-row{flex-direction:column}.field-label{width:auto;margin-bottom:2px}
  .scene-card .field-row{flex-direction:column}.scene-card .field-label{width:auto}
  .login-box{margin:16px;padding:32px 24px;width:auto}
}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="page page-login" id="pageLogin">
  <div class="login-box">
    <span class="login-corner-tl"></span><span class="login-corner-tr"></span>
    <span class="login-corner-bl"></span><span class="login-corner-br"></span>
    <h1>百日攻坚"夏收"行动标准化穿透部署</h1>
    <div class="sub"></div>
    <div class="field"><label>选择角色</label><select id="selRole"></select></div>
    <div class="field"><label>输入密码</label><input type="password" id="txtPwd" placeholder="请输入密码"></div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="error" id="loginErr"></div>
  </div>
</div>

<!-- 主页 -->
<div class="page page-main" id="pageMain">
  <div class="header-bar"><div class="header-inner">
    <div class="header-title">百日攻坚"夏收"行动标准化穿透部署</div>
    <div class="header-user"><span class="zone-badge" id="mainZoneBadge"></span><span class="role-badge" id="mainRoleBadge"></span><button class="btn-admin" id="btnAdmin" style="display:none" onclick="openAdmin()">管理后台</button><button class="btn-logout" onclick="doLogout()">退出</button></div>
  </div></div>
  <div class="main-body">
    <div class="search-section" id="searchSection" style="display:none">
      <input class="search-input" id="guideSearch" placeholder="检索指导角色 / 作战角色（如：张三）" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">搜索</button>
    </div>
    <div class="section-label">六大战役</div><div class="card-grid-3" id="mainBattleGrid"></div>
    <div id="zoneSection"><div class="section-label">四大战区</div><div class="card-grid-4" id="mainZoneGrid"></div></div>
    <div class="troop-overview"><div class="label" id="troopLabel">兵种</div><div class="troop-zones-grid" id="mainTroopZones"></div></div>
    <div class="motto-section"><div class="motto-text">以"商机+标准化"为灵魂</div><div class="motto-sub">扎硬寨，打呆仗，走笨路，用凡人，要巧思，需新为</div></div>
  </div>
</div>

<!-- 战役→战区选择页 -->
<div class="page page-battle-zones" id="pageBattleZones">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="sub-title" id="bzTitle"></div>
    <div class="sub-info" id="bzInfo"></div>
  </div>
  <div class="sub-body" id="bzBody"></div>
</div>

<!-- 战区→战役选择页 -->
<div class="page page-zone-battles" id="pageZoneBattles">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="sub-title" id="zbTitle"></div>
    <div class="sub-info" id="zbInfo"></div>
  </div>
  <div class="sub-body" id="zbBody"></div>
</div>

<!-- 数据详情页（战役+战区交叉） -->
<div class="page page-detail" id="pageDetail">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="breadcrumb" id="detailBreadcrumb"></div>
    <div class="sub-info" id="detailInfo"></div>
  </div>
  <div class="sub-body" id="detailBody"></div>
</div>

<!-- 路径→场景列表页 -->
<div class="page page-path" id="pagePath">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="breadcrumb" id="pathBreadcrumb"></div>
    <div class="sub-info" id="pathInfo"></div>
  </div>
  <div class="sub-body" id="pathBody"></div>
</div>

<!-- 场景详情页（10个单元模块） -->
<div class="page page-scene" id="pageScene">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="breadcrumb" id="sceneBreadcrumb"></div>
    <div class="sub-info" id="sceneInfo"></div>
  </div>
  <div class="sub-body" id="sceneBody"></div>
</div>

<!-- 单元信息展示页 -->
<div class="page page-unit" id="pageUnit">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
    <div class="breadcrumb" id="unitBreadcrumb"></div>
    <div class="sub-info" id="unitInfo"></div>
  </div>
  <div class="sub-body" id="unitBody"></div>
</div>

<script>
let TOKEN='',ROLE=null;

/* 角色列表从后端动态拉取（不再硬编码），含电话等字段暂不在登录页展示 */
(async function(){
  const sel=document.getElementById('selRole');
  try{
    const res=await fetch('/api/roles');
    const groups=await res.json();
    ['管理层','公众战区','商业战区','教科战区','行业战区'].forEach((g,idx)=>{
      if(!groups[g])return;
      if(idx>0){const sep=document.createElement('option');sep.disabled=true;sep.text='──────────';sep.style.color='var(--cyan)';sep.style.fontWeight='700';sel.appendChild(sep);}
      const head=document.createElement('option');head.disabled=true;head.text='【 '+g+' 】';head.style.color='var(--cyan)';head.style.fontWeight='700';sel.appendChild(head);
      groups[g].forEach(r=>{const o=document.createElement('option');o.value=r.id;o.text='  '+r.name;sel.appendChild(o);});
    });
  }catch(e){sel.innerHTML='<option>角色加载失败</option>'}
  /* 检测 URL token 参数（从管理后台返回时），自动恢复会话进入主页 */
  const urlToken=new URLSearchParams(location.search).get('token');
  if(urlToken){
    try{
      const meRes=await fetch('/api/me?token='+encodeURIComponent(urlToken));
      if(meRes.ok){
        const meData=await meRes.json();
        TOKEN=urlToken;ROLE=meData;
        history.replaceState(null,'','/');
        showPage('main');loadMainPage();
      }
    }catch(e){}
  }
})();
document.getElementById('txtPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  const camel='page'+name.replace(/-([a-z])/g,(_,c)=>c.toUpperCase()).replace(/^./,s=>s.toUpperCase());
  const el=document.getElementById(camel);
  if(el) el.style.display=(name==='login')?'flex':'block';
  window.scrollTo(0,0);
}

/* 页面历史栈，用于返回上一级 */
let PAGE_HISTORY=[];
function navigate(name){
  PAGE_HISTORY.push(name);
  showPage(name);
}
function goBack(){
  PAGE_HISTORY.pop(); /* 弹出当前页 */
  const prev=PAGE_HISTORY[PAGE_HISTORY.length-1]||'main';
  showPage(prev);
}
function goMain(){PAGE_HISTORY=[];showPage('main');}
function openAdmin(){location.href='/admin?token='+encodeURIComponent(TOKEN);}

async function doLogin(){
  const rid=document.getElementById('selRole').value,pwd=document.getElementById('txtPwd').value;
  if(!rid){showErr('请选择角色');return;}if(!pwd){showErr('请输入密码');return;}
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role_id:rid,password:pwd})});
    if(!res.ok){const d=await res.json();showErr(d.detail||'登录失败');return;}
    const data=await res.json();TOKEN=data.token;ROLE=data.role;PAGE_HISTORY=['main'];showPage('main');loadMainPage();
  }catch(e){showErr('网络错误');}
}
function showErr(m){document.getElementById('loginErr').textContent=m;}
async function doLogout(){
  try{await fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN})});}catch(e){}
  TOKEN='';ROLE=null;PAGE_HISTORY=[];document.getElementById('txtPwd').value='';document.getElementById('loginErr').textContent='';showPage('login');
}

/* ====== 主页 ====== */
async function loadMainPage(){
  document.getElementById('mainRoleBadge').textContent=ROLE.name;
  document.getElementById('mainRoleBadge').style.background='linear-gradient(135deg,rgba(0,212,255,.15),rgba(46,125,255,.12))';
  document.getElementById('mainZoneBadge').textContent=ROLE.zone_name;
  document.getElementById('mainZoneBadge').style.background=ROLE.color+'44';
  const isAdmin=!!ROLE.is_admin;
  document.getElementById('btnAdmin').style.display=isAdmin?'inline-block':'none';
  document.getElementById('searchSection').style.display=isAdmin?'flex':'none';
  document.getElementById('zoneSection').style.display=isAdmin?'block':'none';
  document.getElementById('troopLabel').textContent=isAdmin?'兵种':'我的战区 · 兵种';
  try{
    const res=await fetch('/api/overview?token='+TOKEN);
    if(!res.ok){if(res.status===401){doLogout();return;}throw new Error();}
    const data=await res.json();
    renderBattleGrid(data.battles);
    if(isAdmin) renderZoneGrid(data.zones);
    renderTroopOverview(data.zones);
  }catch(e){document.getElementById('mainBattleGrid').innerHTML='<div class="empty-state">加载失败</div>';}
}

function renderBattleGrid(battles){
  const isAdmin=!!ROLE.is_admin;
  let h='';battles.forEach(b=>{
    const click=isAdmin?`openBattleZones('${b.id}')`:`openDetail('${b.id}','${ROLE.zone}')`;
    h+=`<div class="card-item" onclick="${click}"><div class="card-name" style="color:${mapBattleColor(b.color)}">${esc(b.name)}</div><div class="card-count">${b.count}条数据</div><div class="card-arrow">&#10095;</div></div>`;
  });if(!h)h='<div class="empty-state">暂无相关战役数据</div>';
  document.getElementById('mainBattleGrid').innerHTML=h;
}

/* 颜色映射：原始暖色 → 自然柔和色（白/金/浅蓝/浅绿） */
function mapBattleColor(c){
  const m={'#8B1A1A':'#ffd980','#C0392B':'#ffb060','#A63A3A':'#c4b5e8','#2E7D32':'#8eecd0'};
  return m[c]||'#ffffff';
}

function renderZoneGrid(zones){
  let h='';zones.forEach(z=>{
    h+=`<div class="card-item card-center" onclick="openZoneBattles('${z.id}')"><div class="card-name" style="color:${mapBattleColor(z.color)}">${esc(z.name)}</div><div class="card-count">${z.count}条数据</div></div>`;
  });document.getElementById('mainZoneGrid').innerHTML=h;
}

function renderTroopOverview(zones){
  const isAdmin=!!ROLE.is_admin;
  const isZoneManager=!isAdmin && (ROLE.role_name||'').match(/分局长|客户经理/);
  const canClick=isAdmin||isZoneManager;
  let h='';zones.forEach(z=>{
    let tags='';(z.roles||[]).forEach(r=>{

/* ====== 悬停预览组件（延迟隐藏+浮层可交互可滚动）====== */
function firstLine(s){return (s||'').trim().split('\n').filter(l=>l.trim())[0]?.trim()||'';}

let HOVER_TIMER=null;
function showHoverTip(e,innerHtml){
  clearTimeout(HOVER_TIMER);
  let tip=document.getElementById('hoverTip');
  if(!tip){
    tip=document.createElement('div');tip.id='hoverTip';tip.className='hover-tip';document.body.appendChild(tip);
    /* 浮层自身可悬停——鼠标移到浮层上时取消隐藏 */
    tip.addEventListener('mouseenter',()=>clearTimeout(HOVER_TIMER));
    tip.addEventListener('mouseleave',()=>{HOVER_TIMER=setTimeout(hideHoverPreview,200);});
  }
  tip.innerHTML=innerHtml;tip.classList.add('show');
  const rect=e.currentTarget.getBoundingClientRect();
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let left=rect.left;
  if(left+tw>window.innerWidth-10)left=Math.max(10,window.innerWidth-tw-10);
  let top=rect.bottom+8;
  if(top+th>window.innerHeight-10)top=Math.max(10,rect.top-th-8);
  tip.style.left=left+'px';tip.style.top=top+'px';
}
function hideHoverPreview(){
  HOVER_TIMER=setTimeout(()=>{
    const tip=document.getElementById('hoverTip');if(tip)tip.classList.remove('show');
  },200);
}

/* 路径卡片悬停：异步加载并预览该路径的所有场景 */
async function hoverPathScenes(e,ck,pname){
  showHoverTip(e,'<div class="ht-title">「'+esc(pname)+'」场景预览</div><div style="color:var(--text-dim)">加载中...</div>');
  let data=SCENE_CACHE[ck];
  if(!data){
    const[bid,zid,pid]=ck.split('|');
    try{
      const res=await fetch('/api/path-detail/'+bid+'/'+zid+'/'+encodeURIComponent(pid)+'?token='+TOKEN);
      if(!res.ok)throw new Error();
      data=await res.json();SCENE_CACHE[ck]=data;
    }catch(err){return;}
  }
  /* 如果浮层已被隐藏（用户快速移开），不更新 */
  const tip=document.getElementById('hoverTip');
  if(!tip||!tip.classList.contains('show'))return;
  const scenes=data.scenes||[];
  if(!scenes.length){tip.innerHTML='<div class="ht-title">「'+esc(pname)+'」</div><div class="ht-empty">暂无场景数据</div>';return;}
  let rows=scenes.map(s=>{
    const st=s['场景名称']||s['场景（对到话术、作战角色）']||'未命名';
    return `<div class="ht-item"><div class="ht-item-name">${esc(s['场景编号']||'')} ${esc(st)}</div>`+
      `<div class="ht-row"><span class="ht-label">指导角色</span><span class="${s['指导角色（营销统筹/专员）']?'ht-val':'ht-empty'}">${s['指导角色（营销统筹/专员）']?esc(s['指导角色（营销统筹/专员）']):'---'}</span></div>`+
      `<div class="ht-row"><span class="ht-label">作战角色</span><span class="${s['作战角色']?'ht-val':'ht-empty'}">${s['作战角色']?esc(s['作战角色']):'---'}</span></div>`+
      `<div class="ht-row"><span class="ht-label">商机来源</span><span class="${s['商机来源']?'ht-val':'ht-empty'}">${s['商机来源']?esc(s['商机来源']):'---'}</span></div>`+
      `</div>`;
  }).join('');
  tip.innerHTML='<div class="ht-title">「'+esc(pname)+'」共 '+scenes.length+' 个场景</div>'+rows;
}

/* 场景模块悬停：预览该场景的全部字段 */
function hoverSceneInfo(e,ck,idx){
  const data=SCENE_CACHE[ck];if(!data||!data.scenes||!data.scenes[idx])return;
  const s=data.scenes[idx];
  const sceneTitle=s['场景名称']||s['场景（对到话术、作战角色）']||'未命名';
  let rows=UNIT_FIELDS.map(u=>{
    const v=(s[u[1]]||'').trim();
    return `<div class="ht-row"><span class="ht-label">${esc(u[0])}</span><span class="${v?'ht-val':'ht-empty'}">${v?esc(firstLine(v)):'---'}</span></div>`;
  }).join('');
  showHoverTip(e,'<div class="ht-title">'+esc(s['场景编号']||'')+' '+esc(sceneTitle)+'</div>'+rows);
}

/* 单元模块悬停：预览该单元的完整信息 */
function hoverUnitInfo(e,ck,sceneIdx,unitIdx){
  const data=SCENE_CACHE[ck];if(!data||!data.scenes||!data.scenes[sceneIdx])return;
  const s=data.scenes[sceneIdx];
  const fd=UNIT_FIELDS[unitIdx];if(!fd)return;
  const v=(s[fd[1]]||'').trim();
  const content=v?esc(v).replace(/\n/g,'<br>'):'<span class="ht-empty">暂无数据</span>';
  showHoverTip(e,'<div class="ht-title">'+esc(fd[0])+'</div><div class="ht-val" style="line-height:1.8">'+content+'</div>');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ====== 通用弹窗 ====== */
function openModal(title, bodyHTML, small){
  let mask=document.getElementById('modalMask');
  if(!mask){
    mask=document.createElement('div');
    mask.id='modalMask';mask.className='modal-mask';
    mask.innerHTML=`<div class="modal-box"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body" id="modalBody"></div></div>`;
    document.body.appendChild(mask);
    mask.addEventListener('click',e=>{if(e.target===mask)closeModal();});
  }
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHTML;
  mask.querySelector('.modal-box').className='modal-box'+(small?' small':'');
  mask.classList.add('show');
}
function closeModal(){const m=document.getElementById('modalMask');if(m)m.classList.remove('show');}

/* ====== 兵种标签点击查看战役信息（作战角色/指导角色权限逻辑一致） ====== */
async function showRoleBattles(roleName){
  openModal('「'+roleName+'」 · 战役信息','<div class="empty-state" style="padding:30px">加载中...</div>');
  try{
    const res=await fetch('/api/role-battles/'+encodeURIComponent(roleName)+'?token='+TOKEN);
    if(!res.ok){
      if(res.status===401){doLogout();return;}
      if(res.status===403){const d=await res.json();document.getElementById('modalBody').innerHTML='<div class="empty-state">'+esc(d.detail||'无权查看')+'</div>';return;}
      throw new Error();
    }
    const data=await res.json();
    if(!data.battles.length){
      document.getElementById('modalBody').innerHTML='<div class="empty-state">「'+esc(roleName)+'」暂无战役数据</div>';
      return;
    }
    let h='<div style="font-size:12px;color:var(--text-dim);margin-bottom:14px;letter-spacing:1px">「'+esc(roleName)+'」共参与 '+data.battles.length+' 个战役，'+data.total+' 条数据</div>';
    h+='<div class="card-grid-3" style="gap:12px">';
    data.battles.forEach(b=>{
      const zoneStr=(b.zones||[]).map(z=>z.name).join('、');
      h+=`<div class="card-item" onclick="closeModal();openDetail('${b.id}','${(b.zones[0]||{}).id||''}')">
        <div class="card-name" style="color:${mapBattleColor(b.color)}">${esc(b.name)}</div>
        <div class="card-count">${b.count}条数据 · ${esc(zoneStr)}</div>
        <div class="card-arrow">&#10095;</div></div>`;
    });
    h+='</div>';
    document.getElementById('modalBody').innerHTML=h;
  }catch(e){document.getElementById('modalBody').innerHTML='<div class="empty-state">加载失败</div>';}
}

/* ====== 检索侧边抽屉 ====== */
function ensureDrawer(){
  let d=document.getElementById('searchDrawer');
  if(!d){
    d=document.createElement('div');d.id='searchDrawer';d.className='search-drawer';
    d.innerHTML=`<div class="drawer-header"><h3 id="drawerTitle">检索结果</h3><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
      <div class="drawer-count" id="drawerCount"></div><div class="drawer-body" id="drawerBody"></div>`;
    document.body.appendChild(d);
  }
  return d;
}
function closeDrawer(){const d=document.getElementById('searchDrawer');if(d)d.classList.remove('show');}
function selectResult(el,bid,zid){
  document.querySelectorAll('#drawerBody .result-item').forEach(r=>r.classList.remove('active'));
  if(el)el.classList.add('active');
  openDetail(bid,zid);
}
async function doSearch(){
  const kw=document.getElementById('guideSearch').value.trim();
  if(!kw){return;}
  const d=ensureDrawer();
  document.getElementById('drawerTitle').textContent='检索：'+kw;
  document.getElementById('drawerCount').textContent='检索中...';
  document.getElementById('drawerBody').innerHTML='<div class="loading">加载中...</div>';
  d.classList.add('show');
  try{
    const res=await fetch('/api/search?keyword='+encodeURIComponent(kw)+'&token='+TOKEN);
    if(!res.ok){if(res.status===401){doLogout();return;}throw new Error();}
    const data=await res.json();
    if(!data.results.length){
      document.getElementById('drawerCount').textContent='未找到匹配';
      document.getElementById('drawerBody').innerHTML='<div class="empty-state">未找到「'+esc(kw)+'」相关的部署记录</div>';
      return;
    }
    document.getElementById('drawerCount').textContent='共 '+data.results.length+' 条匹配 · 点击查看详情';
    let h='';
    data.results.forEach((r,i)=>{
      h+=`<div class="result-item" id="ritem-${i}" onclick="selectResult(this,'${r.battle_id}','${r.warzone_id}')">
        <div class="ri-title">${esc(r.battle_name)} · ${esc(r.path_name||'路径')}</div>
        <div class="ri-meta">
          <span>战区：<b>${esc(r.warzone_name)}</b></span>
          <span>指导：<b>${esc(r.guide_role||'—')}</b></span>
          <span>作战：<b>${esc(r.combat_role||'—')}</b></span>
        </div>
      </div>`;
    });
    document.getElementById('drawerBody').innerHTML=h;
  }catch(e){document.getElementById('drawerBody').innerHTML='<div class="empty-state">检索失败</div>';}
}
</script>
