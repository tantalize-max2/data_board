<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百日攻坚"夏收"行动标准化穿透部署</title>
<link rel="stylesheet" href="/static/css/index.css">
</head>
<body>

<!-- 登录页 -->
<div class="page page-login" id="pageLogin">
  <div class="login-box">
    <span class="login-corner-tl"></span><span class="login-corner-tr"></span>
    <span class="login-corner-bl"></span><span class="login-corner-br"></span>
    <h1>百日攻坚"夏收"行动标准化穿透部署</h1>
    <div class="sub"></div>
    <div class="field"><label>手机号</label><input type="text" id="txtPhone" placeholder="请输入手机号" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('txtPwd').focus()"></div>
    <div class="field"><label>输入密码</label><div style="position:relative"><input type="password" id="txtPwd" placeholder="请输入密码" autocomplete="new-password"><span class="pwd-toggle" id="pwdToggle" onclick="togglePwd()">&#128065;</span></div></div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="error" id="loginErr"></div>
  </div>
</div>

<!-- 主页 -->
<div class="page page-main" id="pageMain">
  <div class="header-bar"><div class="header-inner">
    <div class="header-title">百日攻坚"夏收"行动标准化穿透部署</div>
    <div class="header-user">
      <span class="zone-badge" id="mainZoneBadge"></span>
      <span class="role-badge" id="mainRoleBadge"></span>
      <button class="btn-admin" id="btnChangePwd" onclick="openChangePwdModal()">修改密码</button>
      <button class="btn-admin" id="btnAdmin" style="display:none" onclick="openAdmin()">管理后台</button>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </div></div>
  <div class="main-body">
    <div class="search-section" id="searchSection" style="display:none">
      <input class="search-input" id="guideSearch" placeholder="检索指导角色 / 作战角色（如：张三）" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">搜索</button>
    </div>
    <div class="section-label">六大战役</div><div class="card-grid-3" id="mainBattleGrid"></div>
    <div id="zoneSection"><div class="section-label">四大战区</div><div class="card-grid-4" id="mainZoneGrid"></div></div>
    <div class="troop-overview"><div class="label" id="troopLabel">兵种</div><div class="troop-zones-grid" id="mainTroopZones"></div></div>
    <!-- 资料中心 -->
    <div class="section-label">资料中心</div><div class="info-main-grid" id="mainInfoGrid"></div>
    <div class="motto-section"><div class="motto-text">以"商机+标准化"为灵魂</div><div class="motto-sub">扎硬寨，打呆仗，走笨路，用凡人，要巧思，需新为</div></div>
  </div>
</div>

<!-- 战役→战区选择页 -->
<div class="page page-battle-zones" id="pageBattleZones">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="sub-title" id="bzTitle"></div>
    <div class="sub-info" id="bzInfo"></div>
  </div>
  <div class="sub-body" id="bzBody"></div>
</div>

<!-- 战区→战役选择页 -->
<div class="page page-zone-battles" id="pageZoneBattles">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="sub-title" id="zbTitle"></div>
    <div class="sub-info" id="zbInfo"></div>
  </div>
  <div class="sub-body" id="zbBody"></div>
</div>

<!-- 数据详情页（战役+战区交叉） -->
<div class="page page-detail" id="pageDetail">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="breadcrumb" id="detailBreadcrumb"></div>
    <div class="sub-info" id="detailInfo"></div>
  </div>
  <div class="sub-body" id="detailBody"></div>
</div>

<!-- 路径→场景列表页 -->
<div class="page page-path" id="pagePath">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="breadcrumb" id="pathBreadcrumb"></div>
    <div class="sub-info" id="pathInfo"></div>
  </div>
  <div class="sub-body" id="pathBody"></div>
</div>

<!-- 场景详情页（单元模块） -->
<div class="page page-scene" id="pageScene">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="breadcrumb" id="sceneBreadcrumb"></div>
    <div class="sub-info" id="sceneInfo"></div>
  </div>
  <div class="sub-body" id="sceneBody"></div>
</div>

<!-- 单元信息展示页 -->
<div class="page page-unit" id="pageUnit">
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()">&#8592; 返回</button><button class="home-btn" onclick="goMain()">&#8962; 主页</button>
    <div class="breadcrumb" id="unitBreadcrumb"></div>
    <div class="sub-info" id="unitInfo"></div>
  </div>
  <div class="sub-body" id="unitBody"></div>
</div>

<!-- 资料中心 - 文件列表弹窗 -->
<div class="modal-mask" id="infoModal" onclick="if(event.target===this)closeInfoModal()">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h3 id="infoModalTitle">资料中心</h3>
      <button class="modal-close" onclick="closeInfoModal()">&times;</button>
    </div>
    <div class="modal-body" id="infoModalBody"></div>
  </div>
</div>

<!-- 自定义确认弹窗 -->
<div class="modal-mask" id="confirmMask" onclick="if(event.target===this)closeConfirm()">
  <div class="modal-box modal-sm">
    <div class="modal-header"><h3 id="confirmTitle">确认</h3></div>
    <div class="modal-body"><p class="confirm-msg" id="confirmMsg"></p></div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-no" id="confirmNo" onclick="closeConfirm()">取消</button>
      <button class="modal-btn modal-btn-ok" id="confirmOk" onclick="execConfirm()">确认</button>
    </div>
  </div>
</div>

<!-- 自定义输入弹窗 -->
<div class="modal-mask" id="promptMask" onclick="if(event.target===this)closePrompt()">
  <div class="modal-box modal-sm">
    <div class="modal-header"><h3 id="promptTitle">请输入</h3></div>
    <div class="modal-body">
      <p class="prompt-msg" id="promptMsg"></p>
      <input type="text" class="prompt-input" id="promptInput" onkeydown="onPromptKey(event)">
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-no" onclick="closePrompt()">取消</button>
      <button class="modal-btn modal-btn-ok" id="promptOk" onclick="execPrompt()">确认</button>
    </div>
  </div>
</div>

<!-- 修改密码弹窗（首次登录强制，不可关闭） -->
<div class="modal-mask" id="changePwdMask" tabindex="-1">
  <div class="modal-box modal-sm">
    <div class="modal-header"><h3 id="changePwdTitle">修改密码</h3><button class="modal-close" id="changePwdCloseBtn" onclick="closeChangePwdModal()">&times;</button></div>
    <div class="modal-body">
      <div id="changePwdAlert" style="display:none;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#ffc107">
        首次登录，请修改初始密码后继续使用
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div><label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px">旧密码</label>
          <div style="position:relative"><input type="password" class="prompt-input" id="oldPwd" placeholder="请输入旧密码" style="padding-right:36px"><span class="pwd-toggle-inline" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';this.style.opacity=this.previousElementSibling.type==='password'?.5:1">&#128065;</span></div></div>
        <div><label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px">新密码 <span style="color:var(--text-dim);font-size:11px">(至少7位，含大小写字母+数字+特殊符号)</span></label>
          <div style="position:relative"><input type="password" class="prompt-input" id="newPwd" placeholder="请输入新密码" style="padding-right:36px"><span class="pwd-toggle-inline" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';this.style.opacity=this.previousElementSibling.type==='password'?.5:1">&#128065;</span></div></div>
        <div><label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px">确认新密码</label>
          <div style="position:relative"><input type="password" class="prompt-input" id="newPwd2" placeholder="请再次输入新密码" style="padding-right:36px"><span class="pwd-toggle-inline" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';this.style.opacity=this.previousElementSibling.type==='password'?.5:1">&#128065;</span></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-no" id="changePwdCancel" onclick="closeChangePwdModal()">取消</button>
      <button class="modal-btn modal-btn-ok" onclick="doChangePwd()">确认修改</button>
      <span class="modal-link" id="changePwdLogout" onclick="doChangePwdLogout()" style="display:none;cursor:pointer;font-size:12px;color:var(--text-dim);text-decoration:underline;padding:8px 0;margin-left:auto">返回登录页</span>
    </div>
  </div>
</div>

<!-- 水印层 -->
<div class="watermark-layer" id="watermarkLayer"></div>

<!-- Toast 通知 -->
<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/index.js"></script>
</body>
</html>
